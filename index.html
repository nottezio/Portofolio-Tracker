<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0B6B52">
<title>Portofolio Investasi</title>
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   DESIGN SYSTEM
   Editorial minimalism — think Monocle magazine meets Bloomberg terminal
═══════════════════════════════════════════════════════════════════════════ */
:root {
  /* Colors */
  --ink: #1C1917;
  --ink-soft: #3D3A36;
  --paper: #FAF7F2;
  --paper-raised: #FFFFFF;
  --paper-sunken: #F4F0E8;
  --hairline: #E7E2D9;
  --hairline-strong: #D6CFC3;
  --muted: #8B867E;
  --muted-strong: #6B6560;

  --accent: #0B6B52;
  --accent-hover: #094A3A;
  --accent-bg: #E8F0ED;

  --gain: #0B6B52;
  --gain-bg: #E8F0ED;
  --loss: #B33939;
  --loss-bg: #FAECEC;
  --neutral: #8B867E;

  /* Platform accents */
  --tring: #B8860B;
  --tring-bg: #FDF6E3;
  --bibit: #4A7B4D;
  --bibit-bg: #EDF3EE;
  --stockbit: #2C3E60;
  --stockbit-bg: #E8ECF2;
  --gotrade: #D07C2A;
  --gotrade-bg: #FBEFDE;
  --pluang: #6B3FA0;
  --pluang-bg: #F1EAF8;

  /* Type */
  --serif: 'Iowan Old Style', 'Palatino Linotype', Palatino, 'URW Palladio L', Georgia, serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --mono: ui-monospace, 'SF Mono', 'Menlo', 'Cascadia Code', 'Roboto Mono', monospace;

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(28, 25, 23, 0.04);
  --shadow-md: 0 2px 8px rgba(28, 25, 23, 0.06), 0 1px 2px rgba(28, 25, 23, 0.04);
  --shadow-lg: 0 10px 30px rgba(28, 25, 23, 0.08), 0 2px 8px rgba(28, 25, 23, 0.04);

  /* Radius */
  --r-sm: 3px;
  --r-md: 6px;
  --r-lg: 10px;
  --r-pill: 999px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 15px; -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "kern", "liga", "tnum";
  padding-bottom: 80px;
}

/* ═══════════════════════════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════════════════════════ */
.header {
  background: var(--paper-raised);
  border-bottom: 1px solid var(--hairline);
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(12px);
  background: rgba(255, 255, 255, 0.92);
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 14px 20px;
  display: flex; align-items: center; gap: 16px;
  flex-wrap: wrap;
}
.header-title {
  font-family: var(--serif);
  font-size: 1.25rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
  display: flex; align-items: baseline; gap: 8px;
}
.header-title::before {
  content: "◆";
  color: var(--accent);
  font-size: 0.9em;
}
.header-subtitle {
  font-size: 0.75rem;
  color: var(--muted);
  font-variant: small-caps;
  letter-spacing: 0.08em;
  margin-left: 4px;
}

.header-spacer { flex: 1; }

.kurs-box {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  background: var(--paper-sunken);
  border: 1px solid var(--hairline);
  border-radius: var(--r-md);
  font-size: 0.8rem;
}
.kurs-label { color: var(--muted); font-variant: small-caps; letter-spacing: 0.06em; }
.kurs-input {
  border: none; background: none;
  font-family: var(--mono);
  font-weight: 600;
  font-size: 0.85rem;
  color: var(--ink);
  width: 70px;
  text-align: right;
  outline: none;
}
.kurs-input:focus { color: var(--accent); }

.kurs-sync-btn {
  border: none;
  background: none;
  color: var(--muted);
  cursor: pointer;
  padding: 2px 4px;
  font-size: 0.85rem;
  border-radius: 3px;
  transition: all 0.15s;
  margin-left: 2px;
}
.kurs-sync-btn:hover {
  color: var(--accent);
  background: var(--accent-bg);
  transform: rotate(90deg);
}
.kurs-sync-btn:active { transform: rotate(180deg); }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 13px;
  border: 1px solid var(--hairline-strong);
  background: var(--paper-raised);
  color: var(--ink);
  font-size: 0.8rem;
  font-family: var(--sans);
  font-weight: 500;
  border-radius: var(--r-md);
  cursor: pointer;
  transition: all 0.15s ease;
}
.btn:hover { border-color: var(--ink); background: var(--paper-sunken); }
.btn:active { transform: translateY(1px); }
.btn.btn-primary {
  background: var(--accent); color: white; border-color: var(--accent);
}
.btn.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn.btn-danger { color: var(--loss); border-color: var(--loss); }
.btn.btn-danger:hover { background: var(--loss); color: white; }
.btn.btn-ghost {
  border-color: transparent; background: transparent;
}
.btn.btn-ghost:hover { background: var(--paper-sunken); }

.btn-icon {
  padding: 6px;
  width: 30px; height: 30px;
  justify-content: center;
}

.sync-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--muted); flex-shrink: 0;
}
.sync-dot.synced { background: var(--gain); }
.sync-dot.pending { background: var(--tring); animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.drive-sync-dot {
  display: none;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--muted); flex-shrink: 0;
  margin-right: 4px;
}
.drive-sync-dot.synced { background: var(--gain); }
.drive-sync-dot.pending { background: var(--tring); animation: pulse 1.5s ease-in-out infinite; }
.drive-sync-dot.stale { background: var(--tring); }
.drive-sync-dot.error { background: var(--loss); }

/* ═══════════════════════════════════════════════════════════════════════════
   NAV TABS
═══════════════════════════════════════════════════════════════════════════ */
.nav-tabs {
  background: var(--paper-raised);
  border-bottom: 1px solid var(--hairline);
  position: sticky; top: 58px; z-index: 9;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tabs-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; gap: 2px;
  padding: 0 16px;
  min-width: max-content;
}
.tab {
  padding: 14px 16px;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--muted-strong);
  cursor: pointer;
  border: none; background: none;
  border-bottom: 2px solid transparent;
  transition: all 0.15s ease;
  white-space: nowrap;
  font-family: var(--sans);
  letter-spacing: 0.01em;
}
.tab:hover { color: var(--ink); }
.tab.active {
  color: var(--ink);
  border-bottom-color: var(--ink);
  font-weight: 600;
}
.tab-badge {
  display: inline-block;
  font-size: 0.65rem;
  padding: 1px 6px;
  background: var(--paper-sunken);
  border-radius: var(--r-pill);
  margin-left: 6px;
  color: var(--muted-strong);
  font-weight: 500;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════════════════════════════════════════ */
.main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px 20px 40px;
}

.view { display: none; }
.view.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.section-title {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  color: var(--ink);
}
.section-subtitle {
  font-size: 0.85rem;
  color: var(--muted-strong);
  margin-bottom: 24px;
}

/* ═══════════════════════════════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════════════════════════════ */
.hero-card {
  background: linear-gradient(135deg, #1C1917 0%, #2D2724 100%);
  color: #FAF7F2;
  padding: 32px;
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-lg);
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}
.hero-card::before {
  content: "";
  position: absolute;
  top: -50%; right: -20%;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(11, 107, 82, 0.25) 0%, transparent 70%);
  pointer-events: none;
}
.hero-label {
  font-size: 0.7rem;
  font-variant: small-caps;
  letter-spacing: 0.14em;
  color: rgba(250, 247, 242, 0.55);
  margin-bottom: 10px;
  font-weight: 600;
}
.hero-value {
  font-family: var(--serif);
  font-size: clamp(2.4rem, 6vw, 3.6rem);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1;
  font-feature-settings: "tnum", "lnum";
  margin-bottom: 6px;
}
.hero-currency {
  font-size: 0.9em;
  color: rgba(250, 247, 242, 0.55);
  font-family: var(--sans);
  font-weight: 500;
  font-variant: small-caps;
  letter-spacing: 0.08em;
  margin-right: 8px;
}
.hero-delta {
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 500;
}
.hero-delta.gain { color: #6FCBAE; }
.hero-delta.loss { color: #E28A8A; }
.hero-delta-arrow { font-size: 0.9em; }

.hero-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 24px;
  margin-top: 28px;
  padding-top: 24px;
  border-top: 1px solid rgba(250, 247, 242, 0.12);
}
.hero-stat-label {
  font-size: 0.68rem;
  font-variant: small-caps;
  letter-spacing: 0.12em;
  color: rgba(250, 247, 242, 0.55);
  margin-bottom: 4px;
  font-weight: 600;
}
.hero-stat-value {
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 600;
  color: #FAF7F2;
}

/* Cash balance cards on Dashboard */
.cash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 18px;
}
@media (max-width: 700px) {
  .cash-grid { grid-template-columns: 1fr; }
}
.cash-card {
  background: var(--paper-raised);
  border: 1px solid var(--hairline);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color 0.15s;
}
.cash-card:focus-within { border-color: var(--accent); }
.cash-card-head {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 0;
}
.cash-card-icon { font-size: 1.6rem; line-height: 1; }
.cash-card-label {
  font-family: var(--serif);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.2;
}
.cash-card-sub {
  font-size: 0.72rem;
  color: var(--muted-strong);
  margin-top: 2px;
}
.cash-card-input-wrap {
  display: flex;
  align-items: baseline;
  gap: 6px;
  background: var(--paper-sunken);
  border-radius: 6px;
  padding: 8px 12px;
  min-width: 130px;
}
.cash-card-currency {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--muted-strong);
  font-weight: 600;
}
.cash-card-input {
  font-family: var(--mono);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--ink);
  background: transparent;
  border: none;
  outline: none;
  text-align: right;
  width: 100%;
  min-width: 0;
  padding: 0;
}
.cash-card-input:focus { color: var(--accent); }

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}
@media (max-width: 900px) {
  .grid-2 { grid-template-columns: 1fr; }
}

.card {
  background: var(--paper-raised);
  border: 1px solid var(--hairline);
  border-radius: var(--r-md);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}
.card-title {
  font-family: var(--serif);
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex; align-items: baseline; justify-content: space-between;
}
.card-title-meta {
  font-size: 0.7rem;
  color: var(--muted);
  font-family: var(--sans);
  font-variant: small-caps;
  letter-spacing: 0.08em;
  font-weight: 500;
}

/* Platform breakdown table */
.platform-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.platform-table tr { border-bottom: 1px solid var(--hairline); }
.platform-table tr:last-child { border-bottom: none; }
.platform-table td { padding: 12px 6px; vertical-align: middle; }
.platform-table td:last-child { text-align: right; font-family: var(--mono); }
.platform-row-indicator {
  display: inline-block;
  width: 3px; height: 22px;
  margin-right: 10px;
  vertical-align: middle;
  border-radius: 2px;
}
.platform-row-name {
  display: flex; align-items: center;
  font-weight: 500;
}
.platform-row-name-text { display: inline-flex; flex-direction: column; }
.platform-row-name-main { font-weight: 500; }
.platform-row-name-sub { font-size: 0.7rem; color: var(--muted); }

.allocation-bar {
  display: flex; height: 8px; border-radius: 2px; overflow: hidden;
  background: var(--paper-sunken);
  margin: 12px 0 8px;
}
.allocation-seg { height: 100%; transition: width 0.4s ease; }

.rebalance-alert {
  padding: 10px 12px;
  border-left: 3px solid var(--tring);
  background: var(--tring-bg);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  font-size: 0.8rem;
  margin-top: 10px;
  display: flex; align-items: center; gap: 10px;
}
.rebalance-alert.ok { border-color: var(--gain); background: var(--gain-bg); }

/* Charts */
.chart-wrap { position: relative; height: 260px; }

/* ═══════════════════════════════════════════════════════════════════════════
   TABLES (position/transaction editor)
═══════════════════════════════════════════════════════════════════════════ */
.data-toolbar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.data-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.summary-tile {
  background: var(--paper-raised);
  border: 1px solid var(--hairline);
  border-radius: var(--r-md);
  padding: 12px 16px;
}
.summary-tile-label {
  font-size: 0.68rem;
  font-variant: small-caps;
  letter-spacing: 0.1em;
  color: var(--muted-strong);
  margin-bottom: 4px;
  font-weight: 600;
}
.summary-tile-value {
  font-family: var(--serif);
  font-size: 1.3rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  font-feature-settings: "tnum", "lnum";
}
.summary-tile-value.gain { color: var(--gain); }
.summary-tile-value.loss { color: var(--loss); }
.summary-tile-sub {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 2px;
}

/* Desktop: real table */
.data-table-wrap {
  background: var(--paper-raised);
  border: 1px solid var(--hairline);
  border-radius: var(--r-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}
.data-table thead {
  background: var(--paper-sunken);
  border-bottom: 1px solid var(--hairline-strong);
}
.data-table th {
  text-align: left;
  padding: 12px 10px;
  font-size: 0.68rem;
  font-variant: small-caps;
  letter-spacing: 0.1em;
  font-weight: 600;
  color: var(--muted-strong);
  white-space: nowrap;
}
.data-table th.num, .data-table td.num { text-align: right; font-family: var(--mono); }
.data-table tbody tr { border-bottom: 1px solid var(--hairline); transition: background 0.15s; }
.data-table tbody tr:last-child { border-bottom: none; }
.data-table tbody tr:hover { background: var(--paper-sunken); }
.data-table td {
  padding: 10px;
  vertical-align: middle;
  font-feature-settings: "tnum", "lnum";
}

.data-table input,
.data-table select {
  border: 1px solid transparent;
  background: transparent;
  padding: 6px 8px;
  font-family: inherit;
  font-size: inherit;
  color: var(--ink);
  border-radius: var(--r-sm);
  width: 100%;
  outline: none;
  transition: all 0.15s;
}
.data-table input:hover, .data-table select:hover {
  background: var(--paper-sunken);
}
.data-table input:focus, .data-table select:focus {
  border-color: var(--accent);
  background: white;
  box-shadow: 0 0 0 3px var(--accent-bg);
}
.data-table input.num {
  font-family: var(--mono);
  text-align: right;
}

/* P/L color styles for table cells */
.data-table td.num.gain { color: var(--gain); background: rgba(11, 107, 82, 0.06); }
.data-table td.num.loss { color: var(--loss); background: rgba(179, 57, 57, 0.06); }
.data-table td.num.neutral { color: var(--muted-strong); }

/* Name columns — allow wrapping for long names */
.data-table td.name-cell {
  min-width: 180px;
  white-space: normal;
  word-break: break-word;
  line-height: 1.35;
}
.data-table td.name-cell input {
  white-space: normal;
}

/* Drag-and-drop styles */
.drag-handle {
  cursor: grab;
  color: var(--muted);
  user-select: none;
  -webkit-user-select: none;
  padding: 4px 8px;
  font-size: 1rem;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  transition: all 0.15s;
  touch-action: none;
}
.drag-handle:hover { color: var(--ink); background: var(--paper-sunken); }
.drag-handle:active { cursor: grabbing; }

tr.dragging {
  opacity: 0.4;
  background: var(--accent-bg) !important;
}
tr.drag-over-top { box-shadow: inset 0 2px 0 var(--accent); }
tr.drag-over-bottom { box-shadow: inset 0 -2px 0 var(--accent); }

.mcard.dragging {
  opacity: 0.4;
  background: var(--accent-bg) !important;
  transform: scale(0.98);
}
.mcard.drag-over-top { box-shadow: inset 0 3px 0 var(--accent), 0 1px 2px rgba(28,25,23,0.04); }
.mcard.drag-over-bottom { box-shadow: inset 0 -3px 0 var(--accent), 0 1px 2px rgba(28,25,23,0.04); }

.mcard .drag-handle {
  position: absolute;
  top: 12px; right: 50px;
  font-size: 1.1rem;
  opacity: 0.4;
}
.mcard:hover .drag-handle { opacity: 1; }
.mcard { position: relative; }

.pill {
  display: inline-block;
  padding: 2px 8px;
  font-size: 0.72rem;
  border-radius: var(--r-pill);
  font-weight: 500;
}
.pill.gain { background: var(--gain-bg); color: var(--gain); }
.pill.loss { background: var(--loss-bg); color: var(--loss); }
.pill.neutral { background: var(--paper-sunken); color: var(--muted-strong); }

.delete-btn {
  opacity: 0;
  background: none; border: none; cursor: pointer;
  color: var(--loss); padding: 4px;
  transition: opacity 0.15s;
  font-size: 1rem;
  line-height: 1;
}
tr:hover .delete-btn { opacity: 0.6; }
.delete-btn:hover { opacity: 1; }

/* Mobile: cards */
.mobile-cards { display: none; }
.mcard {
  background: var(--paper-raised);
  border: 1px solid var(--hairline);
  border-radius: var(--r-md);
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
}
.mcard-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 10px;
  gap: 10px;
}
.mcard-title {
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.mcard-subtitle {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 1px;
}
.mcard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 14px;
}
.mcard-field {
  display: flex; flex-direction: column;
  gap: 2px;
}
.mcard-label {
  font-size: 0.66rem;
  font-variant: small-caps;
  letter-spacing: 0.1em;
  color: var(--muted-strong);
  font-weight: 600;
}
.mcard-value {
  font-family: var(--mono);
  font-size: 0.85rem;
  color: var(--ink);
}
.mcard-value.gain { color: var(--gain); }
.mcard-value.loss { color: var(--loss); }
.mcard-value input, .mcard-value select {
  border: 1px solid var(--hairline);
  background: var(--paper-sunken);
  padding: 5px 7px;
  font-family: inherit;
  font-size: inherit;
  color: var(--ink);
  border-radius: var(--r-sm);
  width: 100%;
  outline: none;
}
.mcard-value input:focus, .mcard-value select:focus {
  border-color: var(--accent);
  background: white;
}
.mcard-actions {
  display: flex; justify-content: flex-end;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--hairline);
}

@media (max-width: 760px) {
  .data-table-wrap { display: none; }
  .mobile-cards { display: block; }
  .main { padding: 16px 12px 32px; }
  .hero-card { padding: 22px; margin: -8px -4px 20px; border-radius: var(--r-md); }
  .grid-2 { gap: 16px; }
}

.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 0.9rem;
}
.empty-state .emoji { font-size: 2rem; display: block; margin-bottom: 8px; opacity: 0.5; }

/* ═══════════════════════════════════════════════════════════════════════════
   MODAL / DIALOG
═══════════════════════════════════════════════════════════════════════════ */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(28, 25, 23, 0.5);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  z-index: 100;
  padding: 20px;
}
.modal-backdrop.active { display: flex; }
.modal {
  background: var(--paper-raised);
  border-radius: var(--r-lg);
  max-width: 500px; width: 100%;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.2s ease;
  max-height: 90vh;
  overflow-y: auto;
}
@keyframes modalIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.modal-head {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--hairline);
}
.modal-title {
  font-family: var(--serif);
  font-size: 1.2rem;
  font-weight: 600;
}
.modal-body { padding: 20px 24px; }
.modal-foot {
  padding: 14px 24px;
  border-top: 1px solid var(--hairline);
  display: flex; justify-content: flex-end; gap: 8px;
  background: var(--paper-sunken);
  border-radius: 0 0 var(--r-lg) var(--r-lg);
}

.form-row { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 0.75rem;
  font-variant: small-caps;
  letter-spacing: 0.08em;
  color: var(--muted-strong);
  margin-bottom: 6px;
  font-weight: 600;
}
.form-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--hairline-strong);
  border-radius: var(--r-sm);
  font-size: 0.9rem;
  font-family: var(--sans);
  color: var(--ink);
  background: white;
  outline: none;
  transition: all 0.15s;
}
.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-bg);
}
.form-input.num { font-family: var(--mono); text-align: right; }

/* Toast */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--ink);
  color: white;
  padding: 10px 18px;
  border-radius: var(--r-pill);
  font-size: 0.85rem;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 200;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

<script>
// ═══════════════════════════════════════════════════════════════════════════
// STATE MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'portofolio-investasi-v1';
const FILE_HANDLE_KEY = 'sync-folder-handle';

let state = null;
let activeTab = 'dashboard';
let editingId = null; // for mobile edit forms
let fileHandle = null; // File System Access API directory handle

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.error('Load error:', e); }
  return null;
}

// Save state to localStorage.
// - silent=false (default): user just edited → bump lastModified, schedule sync
// - silent=true: sync operation (pull/apply prices) → DO NOT bump lastModified
//   (otherwise we'd overwrite remote's authoritative timestamp on every pull,
//    causing the next refresh to think local is newer than it really is)
// - bumpTime=true with silent=true: forced timestamp bump even in silent mode
//   (used after applying remote-fetched prices that should be re-pushed)
function saveState(silent = false, bumpTime = null) {
  // Decide whether to bump lastModified:
  //   - explicit bumpTime parameter wins
  //   - else: bump only when not silent (user-initiated)
  const shouldBump = bumpTime !== null ? bumpTime : !silent;
  if (shouldBump) {
    state.lastModified = new Date().toISOString();
  }
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    toast('Gagal menyimpan: storage penuh?');
    return;
  }
  if (!silent) {
    scheduleAutoSync();
    scheduleAppsScriptPush();
    scheduleGithubPush();
  }
  updateSyncDot('synced');
}

function initState() {
  const saved = loadState();
  if (saved && saved.version >= 1) {
    state = saved;
    // Ensure new fields exist (schema migration)
    if (!state.snapshots) state.snapshots = [];
    if (!state.settings.targetAllocation) {
      state.settings.targetAllocation = __INITIAL_DATA__.settings.targetAllocation;
    }
    if (!state.settings.sheetsSyncUrls) {
      state.settings.sheetsSyncUrls = {
        stockbit: '', gotrade: '', pluang: '', tring: '', bibit: ''
      };
    }
    if (!state.settings.lastSheetsSync) state.settings.lastSheetsSync = {};
    if (!state.settings.appsScript) {
      state.settings.appsScript = { url: '', token: '', autoPull: true, autoPush: true };
    }
  } else {
    state = JSON.parse(JSON.stringify(__INITIAL_DATA__));
    state.settings.sheetsSyncUrls = {
      stockbit: '', gotrade: '', pluang: '', tring: '', bibit: ''
    };
    state.settings.lastSheetsSync = {};
    state.settings.appsScript = { url: '', token: '', autoPull: true, autoPush: true };
    saveState(true);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// GOOGLE SHEETS PRICE SYNC
// ═══════════════════════════════════════════════════════════════════════════
// Parse CSV text → array of rows (handles quoted values, commas inside quotes)
function parseCSV(text) {
  const rows = [];
  let cur = [];
  let field = '';
  let inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuote) {
      if (ch === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else inQuote = false;
      } else field += ch;
    } else {
      if (ch === '"') inQuote = true;
      else if (ch === ',') { cur.push(field); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (field.length || cur.length) { cur.push(field); rows.push(cur); cur = []; field = ''; }
        if (ch === '\r' && text[i+1] === '\n') i++;
      } else field += ch;
    }
  }
  if (field.length || cur.length) { cur.push(field); rows.push(cur); }
  return rows;
}

// Parse a number that may have locale formatting (e.g. "1.234,56" Indonesian or "1,234.56" US)
function parseLocaleNumber(str) {
  if (str == null) return NaN;
  str = String(str).trim().replace(/[^\d.,-]/g, '');
  if (!str) return NaN;
  // Count occurrences — multiple of same separator = thousand separator
  const dots = (str.match(/\./g) || []).length;
  const commas = (str.match(/,/g) || []).length;
  const lastDot = str.lastIndexOf('.');
  const lastComma = str.lastIndexOf(',');

  if (dots > 0 && commas > 0) {
    // Both present — the last one is the decimal separator
    if (lastComma > lastDot) {
      str = str.replace(/\./g, '').replace(',', '.');
    } else {
      str = str.replace(/,/g, '');
    }
  } else if (dots > 1) {
    // Multiple dots, no commas → Indonesian thousand separators (e.g. "2.695.000")
    str = str.replace(/\./g, '');
  } else if (commas > 1) {
    // Multiple commas, no dots → US thousand separators (e.g. "3,535,000")
    str = str.replace(/,/g, '');
  } else if (commas === 1) {
    // Single comma — decimal or thousand?
    const afterComma = str.length - lastComma - 1;
    if (afterComma === 3) str = str.replace(/,/g, '');
    else str = str.replace(',', '.');
  }
  // Single dot or no separator → parseFloat handles it as-is
  const n = parseFloat(str);
  return isNaN(n) ? NaN : n;
}

// Fetch CSV from Google Sheets publish URL
async function fetchSheetCSV(url) {
  if (!url || !url.trim()) throw new Error('URL kosong');

  // If Apps Script is configured, route through it to bypass CORS.
  // This is necessary when app is opened from file:// protocol because
  // Google Sheets publish-to-web URLs don't send CORS headers for null origin.
  const { url: scriptUrl, token } = getAppsScriptConfig();

  // DIAGNOSTIC: log status to console so user can debug from F12
  console.log('[fetchSheetCSV] Apps Script configured:', Boolean(scriptUrl && token),
              '| URL:', scriptUrl ? '✓' : '✗',
              '| Token:', token ? '✓' : '✗');

  if (scriptUrl && token) {
    try {
      const proxyUrl = `${scriptUrl}?token=${encodeURIComponent(token)}&action=proxy_fetch&url=${encodeURIComponent(url)}`;
      console.log('[fetchSheetCSV] Trying proxy:', proxyUrl.substring(0, 80) + '...');
      const res = await fetch(proxyUrl, { method: 'GET', cache: 'no-cache', redirect: 'follow' });
      console.log('[fetchSheetCSV] Proxy response status:', res.status);
      if (!res.ok) throw new Error(`Proxy HTTP ${res.status}`);
      const body = await res.json();
      if (body.error) throw new Error('Proxy error: ' + body.error);
      if (body.status !== 'ok') throw new Error('Unexpected proxy response');
      console.log('[fetchSheetCSV] Proxy success, content length:', body.content.length);
      return body.content;
    } catch (err) {
      console.warn('[fetchSheetCSV] Proxy failed:', err.message, '— trying direct...');
      // Fall through to direct fetch as fallback
    }
  } else {
    console.warn('[fetchSheetCSV] Apps Script NOT configured — Drive Sync URL/Token kosong di Settings');
  }

  // Direct fetch (works only when app is served from http://, not file://)
  try {
    console.log('[fetchSheetCSV] Trying direct fetch...');
    const res = await fetch(url, { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.text();
  } catch (err) {
    // Likely CORS / file:// protocol issue
    if (err.message === 'Failed to fetch' || err.name === 'TypeError') {
      const reason = (scriptUrl && token)
        ? 'Apps Script proxy juga gagal — cek browser console (F12) untuk detail. Apps Script perlu re-deploy version baru?'
        : 'Apps Script belum di-set di Settings → ☁️ Google Drive Sync. Setup dulu untuk bypass CORS.';
      throw new Error(`CORS blocked — ${reason}`);
    }
    throw err;
  }
}

// Diagnostic tool — runs all checks and shows results
async function runDiagnostic() {
  const results = [];
  const log = (label, status, detail) => results.push({ label, status, detail });

  // Check 1: Apps Script config
  const { url, token } = getAppsScriptConfig();
  log('Apps Script URL configured', url ? 'OK' : 'FAIL', url ? url.substring(0, 50) + '...' : 'Empty in Settings');
  log('Apps Script Token configured', token ? 'OK' : 'FAIL', token ? `${token.substring(0,4)}...${token.substring(token.length-4)} (${token.length} chars)` : 'Empty');

  if (!url || !token) {
    log('Conclusion', 'FAIL', 'Setup Apps Script di Settings → ☁️ Google Drive Sync dulu.');
    showDiagnosticModal(results);
    return;
  }

  // Check 2: Apps Script ping
  try {
    const res = await fetch(`${url}?token=${encodeURIComponent(token)}&action=ping`, { method: 'GET', redirect: 'follow', cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const body = await res.json();
    if (body.error) throw new Error(body.error);
    log('Apps Script reachable', 'OK', 'Ping sukses, script jalan');
  } catch (err) {
    log('Apps Script reachable', 'FAIL', err.message);
    log('Conclusion', 'FAIL', 'Apps Script tidak bisa diakses. Cek deployment "Who has access" = Anyone.');
    showDiagnosticModal(results);
    return;
  }

  // Check 3: proxy_fetch endpoint
  try {
    const testUrl = 'https://docs.google.com/spreadsheets/d/e/test';
    const res = await fetch(`${url}?token=${encodeURIComponent(token)}&action=proxy_fetch&url=${encodeURIComponent(testUrl)}`, { method: 'GET', redirect: 'follow', cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const body = await res.json();
    // Either 'ok' (succeeded) or 'Upstream HTTP 4xx' (test URL doesn't exist but endpoint works)
    if (body.error && body.error.startsWith('Upstream HTTP')) {
      log('proxy_fetch endpoint', 'OK', 'Endpoint exists & responding');
    } else if (body.error === 'Unknown action: proxy_fetch') {
      log('proxy_fetch endpoint', 'FAIL', 'Action tidak dikenali — Apps Script BELUM di-redeploy dengan kode baru');
    } else if (body.status === 'ok') {
      log('proxy_fetch endpoint', 'OK', 'Endpoint exists & working');
    } else {
      log('proxy_fetch endpoint', 'WARN', 'Response: ' + JSON.stringify(body).substring(0, 100));
    }
  } catch (err) {
    log('proxy_fetch endpoint', 'FAIL', err.message);
  }

  // Check 4: crypto_price endpoint
  try {
    const res = await fetch(`${url}?token=${encodeURIComponent(token)}&action=crypto_price&symbols=bitcoin`, { method: 'GET', redirect: 'follow', cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const body = await res.json();
    if (body.status === 'ok' && body.prices && body.prices.bitcoin) {
      log('crypto_price endpoint', 'OK', `BTC = Rp ${body.prices.bitcoin.toLocaleString('id-ID')}`);
    } else if (body.error === 'Unknown action: crypto_price') {
      log('crypto_price endpoint', 'FAIL', 'Action tidak dikenali — Apps Script BELUM di-redeploy');
    } else {
      log('crypto_price endpoint', 'WARN', 'Response: ' + JSON.stringify(body).substring(0, 100));
    }
  } catch (err) {
    log('crypto_price endpoint', 'FAIL', err.message);
  }

  // Check 5: actual Sheets URLs
  const platforms = ['stockbit', 'gotrade', 'tring', 'bibit'];
  for (const p of platforms) {
    const sheetUrl = state.settings.sheetsSyncUrls[p];
    if (!sheetUrl) {
      log(`Sheet URL: ${p}`, 'SKIP', 'Belum di-set');
      continue;
    }
    try {
      const proxyUrl = `${url}?token=${encodeURIComponent(token)}&action=proxy_fetch&url=${encodeURIComponent(sheetUrl)}`;
      const res = await fetch(proxyUrl, { method: 'GET', redirect: 'follow', cache: 'no-cache' });
      const body = await res.json();
      if (body.status === 'ok') {
        const lines = body.content.split('\n').length;
        log(`Sheet URL: ${p}`, 'OK', `${lines} baris di-fetch`);
      } else {
        log(`Sheet URL: ${p}`, 'FAIL', body.error || 'Unknown');
      }
    } catch (err) {
      log(`Sheet URL: ${p}`, 'FAIL', err.message);
    }
  }

  showDiagnosticModal(results);
}

function showDiagnosticModal(results) {
  document.getElementById('modalTitle').textContent = '🔍 Diagnostic Result';
  const rows = results.map(r => {
    const color = r.status === 'OK' ? 'var(--gain)' : r.status === 'FAIL' ? 'var(--loss)' : r.status === 'SKIP' ? 'var(--muted)' : 'var(--tring)';
    const icon = r.status === 'OK' ? '✓' : r.status === 'FAIL' ? '✗' : r.status === 'SKIP' ? '○' : '⚠';
    return `
      <div style="display:flex; gap:12px; padding:10px; border-bottom:1px solid var(--hairline)">
        <span style="color:${color}; font-weight:600; min-width:20px">${icon}</span>
        <div style="flex:1">
          <div style="font-weight:500">${r.label}</div>
          <div style="font-size:0.78rem; color:var(--muted-strong); font-family:var(--mono); margin-top:2px; word-break:break-all">${r.detail}</div>
        </div>
        <span style="font-size:0.7rem; color:${color}; font-weight:700; font-variant:small-caps; letter-spacing:0.1em">${r.status}</span>
      </div>
    `;
  }).join('');
  document.getElementById('modalBody').innerHTML = `
    <div style="font-size:0.85rem">
      <div style="margin-bottom:14px; color:var(--muted-strong)">
        Hasil diagnostic. Klik <kbd style="background:var(--paper-sunken); padding:2px 6px; border-radius:3px; font-size:0.78rem">F12</kbd> di browser untuk lihat detail di Console.
      </div>
      ${rows}
    </div>
  `;
  document.getElementById('modalBackdrop').classList.add('active');
}

// Map of common crypto symbols to CoinGecko IDs
const CRYPTO_SYMBOL_MAP = {
  BTC: 'bitcoin',
  ETH: 'ethereum',
  SOL: 'solana',
  ADA: 'cardano',
  XRP: 'ripple',
  DOGE: 'dogecoin',
  DOT: 'polkadot',
  AVAX: 'avalanche-2',
  MATIC: 'matic-network',
  LINK: 'chainlink',
  BNB: 'binancecoin',
  LTC: 'litecoin',
  USDT: 'tether',
  USDC: 'usd-coin'
};

// Fetch live crypto prices via Apps Script proxy → CoinGecko (more reliable than GOOGLEFINANCE)
async function fetchCryptoPrices(symbols) {
  const { url: scriptUrl, token } = getAppsScriptConfig();
  if (!scriptUrl || !token) {
    throw new Error('Apps Script belum di-setup — perlu untuk fetch crypto prices');
  }
  // Map symbols (BTC, ETH) to CoinGecko IDs (bitcoin, ethereum)
  const ids = symbols.map(s => CRYPTO_SYMBOL_MAP[s.toUpperCase()] || s.toLowerCase()).join(',');
  const proxyUrl = `${scriptUrl}?token=${encodeURIComponent(token)}&action=crypto_price&symbols=${encodeURIComponent(ids)}`;
  const res = await fetch(proxyUrl, { cache: 'no-cache', redirect: 'follow' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const body = await res.json();
  if (body.error) throw new Error(body.error);
  if (body.status !== 'ok') throw new Error('Unexpected response');

  // Map back: { bitcoin: 1234567 } → { BTC: 1234567 }
  const result = {};
  for (const [symbol, geckoId] of Object.entries(CRYPTO_SYMBOL_MAP)) {
    if (body.prices[geckoId] != null) result[symbol] = body.prices[geckoId];
  }
  return result;
}
async function refreshSheetPrices(platform) {
  // Special case: Pluang crypto — use CoinGecko via Apps Script (GOOGLEFINANCE crypto is broken)
  if (platform === 'pluang') {
    const symbols = state.pluang.positions.map(p => (p.simbol || '').toUpperCase()).filter(Boolean);
    if (symbols.length === 0) return { updated: 0, skipped: 0 };
    try {
      const prices = await fetchCryptoPrices(symbols);
      let updated = 0, skipped = 0;
      const skippedSymbols = [];
      state.pluang.positions.forEach(p => {
        const key = (p.simbol || '').toUpperCase();
        if (prices[key] != null && prices[key] > 0) {
          p.hargaSekarang = prices[key]; updated++;
        } else { skipped++; skippedSymbols.push(key); }
      });
      state.settings.lastSheetsSync.pluang = new Date().toISOString();
      saveState();
      return {
        updated, skipped,
        errors: skippedSymbols.length ? [`Tidak match: ${skippedSymbols.join(', ')}`] : []
      };
    } catch (e) {
      return { error: `Crypto fetch: ${e.message}` };
    }
  }

  const url = state.settings.sheetsSyncUrls[platform];
  if (!url) return { error: 'URL belum di-set' };

  let csv;
  try { csv = await fetchSheetCSV(url); }
  catch (e) { return { error: `Gagal fetch: ${e.message}` }; }

  const rows = parseCSV(csv);
  if (rows.length < 2) return { error: 'CSV kosong atau tidak valid' };

  // Build map: identifier → price
  // Sheet format: Column A = identifier, Column B = price. First row is header, skip.
  const priceMap = {};
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row[0] || !row[0].trim()) continue;
    const key = row[0].trim().toUpperCase();
    const price = parseLocaleNumber(row[1]);
    if (!isNaN(price) && price > 0) priceMap[key] = price;
  }

  let updated = 0, skipped = 0;
  const errors = [];

  if (platform === 'stockbit') {
    state.stockbit.positions.forEach(p => {
      const key = (p.kode || '').toUpperCase();
      if (priceMap[key] != null) { p.hargaSekarang = priceMap[key]; updated++; }
      else skipped++;
    });
  } else if (platform === 'gotrade') {
    state.gotrade.positions.forEach(p => {
      const key = (p.ticker || '').toUpperCase();
      if (priceMap[key] != null) { p.hargaSekarangUSD = priceMap[key]; updated++; }
      else skipped++;
    });
  } else if (platform === 'pluang') {
    state.pluang.positions.forEach(p => {
      const key = (p.simbol || '').toUpperCase();
      if (priceMap[key] != null) { p.hargaSekarang = priceMap[key]; updated++; }
      else skipped++;
    });
  } else if (platform === 'tring') {
    // Match "Harga Buyback" label
    const buybackKey = Object.keys(priceMap).find(k => k.includes('BUYBACK'));
    if (buybackKey && priceMap[buybackKey] > 0) {
      state.tring.hargaBuybackSaatIni = priceMap[buybackKey];
      updated = 1;
    } else {
      errors.push('Baris "Harga Buyback" tidak ditemukan di CSV');
    }
  } else if (platform === 'bibit') {
    state.bibit.positions.forEach(p => {
      // Match by name (case-insensitive, flexible)
      const nameKey = (p.nama || '').toUpperCase().trim();
      const found = Object.keys(priceMap).find(k => k === nameKey || k.includes(nameKey) || nameKey.includes(k));
      if (found && priceMap[found] > 0) {
        p.navSekarang = priceMap[found]; updated++;
      } else skipped++;
    });
  }

  state.settings.lastSheetsSync[platform] = new Date().toISOString();
  saveState();
  return { updated, skipped, errors };
}

// Refresh all configured platforms
async function refreshAllSheets() {
  const platforms = ['stockbit', 'gotrade', 'pluang', 'tring', 'bibit'];
  const configured = platforms.filter(p => state.settings.sheetsSyncUrls[p]);
  if (configured.length === 0) {
    toast('Belum ada Sheets URL yang dikonfigurasi');
    return;
  }
  toast(`Sync ${configured.length} platform…`);
  const results = {};
  for (const p of configured) {
    results[p] = await refreshSheetPrices(p);
  }
  // Build summary
  const summary = configured.map(p => {
    const r = results[p];
    if (r.error) return `${p}: ❌ ${r.error}`;
    return `${p}: ✓ ${r.updated} updated${r.skipped ? `, ${r.skipped} skip` : ''}`;
  }).join(' · ');
  toast(summary);
  // Re-render current view
  render();
}

// Unified refresh — pull Drive first, then update prices, then push
async function refreshAllNow() {
  const hasGithub = isGithubConfigured();
  const hasWorker = isPriceWorkerConfigured();
  const hasSheets = Object.values(state.settings.sheetsSyncUrls || {}).some(v => v);
  const hasDrive = isAppsScriptConfigured();

  // PRIMARY PATH: GitHub for data sync + Worker for prices
  if (hasGithub || hasWorker) {
    const localTimeBefore = new Date(state.lastModified || 0).getTime();

    // Fetch data sync (GitHub) and prices (Worker) in parallel
    const tasks = [];
    tasks.push(hasGithub ? githubPull({ silent: true }) : Promise.resolve({ ok: false }));
    tasks.push(hasWorker ? fetchPricesFromWorker().then(p => ({ ok: true, prices: p })).catch(e => ({ ok: false, error: e.message }))
                         : githubPullPrices({ silent: true }));
    const [pullResult, pricesResult] = await Promise.all(tasks);

    // Apply prices
    let appliedCount = 0;
    let priceError = null;
    if (pricesResult.ok && pricesResult.prices) {
      appliedCount = applyPrices(pricesResult.prices).applied;
    } else if (pricesResult.error) {
      priceError = pricesResult.error;
    }

    // Decide if push needed
    const localTimeAfter = new Date(state.lastModified || 0).getTime();
    const localChangedDuringSync = localTimeAfter > localTimeBefore + 100;

    if (hasGithub && (pullResult.localNewer || localChangedDuringSync || (appliedCount > 0 && !pullResult.pulled))) {
      saveState(true, true);
      await githubPush({ silent: true });
    } else if (appliedCount > 0) {
      saveState(true, false);
    }

    render();

    // Feedback
    const ageMin = pricesResult.prices?.lastUpdated
      ? Math.round((Date.now() - new Date(pricesResult.prices.lastUpdated).getTime()) / 60000)
      : null;
    const ageStr = ageMin != null && ageMin > 1 ? ` (${ageMin}m lalu)` : '';
    if (priceError) {
      toast(`⚠ Sync data OK, tapi harga gagal: ${priceError}`);
    } else if (pullResult.pulled) {
      toast(`✓ Pulled dari device lain · ${appliedCount} harga${ageStr}`);
    } else if (appliedCount > 0) {
      toast(`✓ ${appliedCount} harga di-update${ageStr}`);
    } else {
      toast(`✓ Sudah sinkron`);
    }
    return;
  }

  // LEGACY PATH: Apps Script + Sheets
  if (!hasSheets && !hasDrive) {
    toast('Setup GitHub + Price Worker di Settings dulu');
    return;
  }
  if (hasDrive) await appsScriptPush({ silent: true });
  if (hasDrive) await appsScriptPull({ silent: true });
  if (hasDrive) await syncUsdIdrRate({ silent: true });
  if (hasSheets) await refreshAllSheets();
  if (hasDrive) await appsScriptPush({ silent: true });
  if (!hasSheets && hasDrive) toast('✓ Sync dengan Drive selesai');
}

// Fetch live USD/IDR rate via CoinGecko (free, no key, supports CORS via proxy)
async function syncUsdIdrRate({ silent = false } = {}) {
  const { url: scriptUrl, token } = getAppsScriptConfig();
  if (!scriptUrl || !token) {
    if (!silent) toast('Apps Script belum di-setup');
    return { ok: false };
  }
  try {
    // Use CoinGecko USD price endpoint (USD = 1 USD, returns equivalent in IDR)
    // We fetch a stablecoin to get the conversion
    const proxyUrl = `${scriptUrl}?token=${encodeURIComponent(token)}&action=usd_idr_rate`;
    const res = await fetch(proxyUrl, { method: 'GET', cache: 'no-cache', redirect: 'follow' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const body = await res.json();
    if (body.error) throw new Error(body.error);
    if (body.status !== 'ok' || !body.rate) throw new Error('Invalid response');

    const oldRate = state.settings.kursUsdIdr;
    state.settings.kursUsdIdr = Math.round(body.rate);
    saveState(true); // silent — we're already in a refresh sequence

    // Update the input field if visible
    const kursInput = document.getElementById('kursInput');
    if (kursInput) kursInput.value = state.settings.kursUsdIdr;

    if (!silent) {
      const source = body.source ? ` [${body.source}]` : '';
      toast(`✓ Kurs USD/IDR: ${oldRate.toLocaleString('id-ID')} → ${Math.round(body.rate).toLocaleString('id-ID')}${source}`);
    }
    return { ok: true, rate: body.rate };
  } catch (err) {
    if (!silent) {
      const friendly = err.message.includes('rate limit') || err.message.includes('429')
        ? 'Rate limit dari API — coba lagi 1-2 menit'
        : err.message;
      toast(`Kurs gagal: ${friendly}`);
    }
    return { ok: false, error: err.message };
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// APPS SCRIPT DRIVE SYNC (cross-device sync via Apps Script Web App)
// ═══════════════════════════════════════════════════════════════════════════
let appsScriptPushTimer = null;
let isPulling = false; // prevents push during a pull cycle
let lastRemoteTimestamp = null;

function getAppsScriptConfig() {
  const cfg = state.settings.appsScript || {};
  return {
    url: (cfg.url || '').trim(),
    token: (cfg.token || '').trim(),
    autoPull: cfg.autoPull !== false,
    autoPush: cfg.autoPush !== false
  };
}

function isAppsScriptConfigured() {
  const { url, token } = getAppsScriptConfig();
  return Boolean(url && token);
}

// PULL: fetch portfolio.json from Drive via Apps Script
async function appsScriptPull({ silent = false } = {}) {
  const { url, token } = getAppsScriptConfig();
  if (!url || !token) {
    if (!silent) toast('Apps Script belum di-setup');
    return { ok: false, error: 'not_configured' };
  }

  isPulling = true;
  updateAppsScriptDot('pending');
  try {
    const res = await fetch(`${url}?token=${encodeURIComponent(token)}&action=read`, {
      method: 'GET',
      redirect: 'follow',
      cache: 'no-cache'
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const body = await res.json();

    if (body.error) throw new Error(body.error);
    if (body.status === 'not_found') {
      if (!silent) toast('Belum ada data di Drive. Push dulu dari laptop.');
      updateAppsScriptDot('idle');
      return { ok: false, error: 'not_found' };
    }
    if (!body.data) throw new Error('No data in response');

    const remote = body.data;
    const remoteTime = new Date(remote.lastModified || 0).getTime();
    const localTime = new Date(state.lastModified || 0).getTime();
    lastRemoteTimestamp = remoteTime;

    if (remoteTime > localTime + 1000) {
      // Remote is newer — adopt it
      // CRITICAL: preserve local Apps Script config before overwrite
      // (we strip appsScript from remote payloads on push for security,
      //  so it's always empty in remote — must restore from local)
      const localAppsScript = JSON.parse(JSON.stringify(state.settings.appsScript || {}));
      const localSheetsSyncUrls = JSON.parse(JSON.stringify(state.settings.sheetsSyncUrls || {}));

      state = remote;
      if (!state.snapshots) state.snapshots = [];
      if (!state.settings) state.settings = {};

      // Restore device-specific settings (URL, token, sheet URLs)
      // These are intentionally not stored in Drive for security
      state.settings.appsScript = localAppsScript;
      // Only overwrite sheet URLs if remote has them (otherwise keep local)
      if (!state.settings.sheetsSyncUrls || Object.keys(state.settings.sheetsSyncUrls).length === 0) {
        state.settings.sheetsSyncUrls = localSheetsSyncUrls;
      }

      saveState(true, false); // preserve remote timestamp (not bumping)
      render();
      if (!silent) toast(`✓ Data di-pull dari Drive (${fmtDateTime(new Date(remoteTime).toISOString())})`);
      updateAppsScriptDot('synced');
      return { ok: true, pulled: true };
    } else if (localTime > remoteTime + 1000) {
      // Local is newer — recommend push
      if (!silent) toast('Data lokal lebih baru dari Drive. Klik "Push" untuk upload.');
      updateAppsScriptDot('stale');
      return { ok: true, localNewer: true };
    } else {
      // In sync
      if (!silent) toast('✓ Sudah sinkron dengan Drive');
      updateAppsScriptDot('synced');
      return { ok: true, inSync: true };
    }
  } catch (err) {
    console.error('Pull failed:', err);
    if (!silent) toast(`❌ Pull gagal: ${err.message}`);
    updateAppsScriptDot('error');
    return { ok: false, error: err.message };
  } finally {
    isPulling = false;
  }
}

// PUSH: upload current state to Drive via Apps Script
async function appsScriptPush({ silent = false } = {}) {
  const { url, token } = getAppsScriptConfig();
  if (!url || !token) {
    if (!silent) toast('Apps Script belum di-setup');
    return { ok: false, error: 'not_configured' };
  }

  updateAppsScriptDot('pending');
  try {
    // Strip the appsScript config from payload so token doesn't live in the file
    const payload = JSON.parse(JSON.stringify(state));
    if (payload.settings && payload.settings.appsScript) {
      payload.settings.appsScript = { url: '', token: '', autoPull: true, autoPush: true };
    }

    const res = await fetch(url, {
      method: 'POST',
      redirect: 'follow',
      // Using text/plain to avoid CORS preflight (Apps Script quirk)
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ token, data: payload })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const body = await res.json();

    if (body.error) throw new Error(body.error);
    if (body.status !== 'ok') throw new Error('Unexpected response');

    lastRemoteTimestamp = new Date(body.lastModified).getTime();
    if (!silent) toast(`✓ Upload ke Drive (${(body.size/1024).toFixed(1)} KB)`);
    updateAppsScriptDot('synced');
    return { ok: true };
  } catch (err) {
    console.error('Push failed:', err);
    if (!silent) toast(`❌ Push gagal: ${err.message}`);
    updateAppsScriptDot('error');
    return { ok: false, error: err.message };
  }
}

// Test connection — ping the script to verify setup
async function appsScriptTest() {
  const { url, token } = getAppsScriptConfig();
  if (!url || !token) {
    alert('Masukkan URL dan token dulu');
    return;
  }
  toast('Testing koneksi…');
  try {
    const res = await fetch(`${url}?token=${encodeURIComponent(token)}&action=ping`, {
      method: 'GET',
      redirect: 'follow',
      cache: 'no-cache'
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const body = await res.json();
    if (body.error) throw new Error(body.error);
    if (body.status === 'ok') {
      toast('✓ Koneksi sukses! Script jalan.');
    } else {
      throw new Error('Unexpected response: ' + JSON.stringify(body));
    }
  } catch (err) {
    alert(`Gagal koneksi:\n\n${err.message}\n\nCek:\n1. URL benar (diakhiri /exec)\n2. Token benar (case-sensitive)\n3. Script sudah di-deploy sebagai Web App\n4. Access = "Anyone"`);
  }
}

// Debounced auto-push after local edits
function scheduleAppsScriptPush() {
  const { autoPush } = getAppsScriptConfig();
  if (!autoPush || !isAppsScriptConfigured() || isPulling) return;
  if (appsScriptPushTimer) clearTimeout(appsScriptPushTimer);
  updateAppsScriptDot('pending');
  appsScriptPushTimer = setTimeout(() => appsScriptPush({ silent: true }), 3000);
}

function updateAppsScriptConfig(key, value) {
  if (!state.settings.appsScript) state.settings.appsScript = {};
  state.settings.appsScript[key] = value;
  saveState(true); // save silently, don't trigger push to avoid circular
  // Update header refresh button visibility
  const anySync = isAppsScriptConfigured() ||
                  Object.values(state.settings.sheetsSyncUrls || {}).some(v => v);
  const btn = document.getElementById('refreshBtn');
  if (btn) btn.style.display = anySync ? 'inline-flex' : 'none';
  updateAppsScriptDot(isAppsScriptConfigured() ? 'idle' : 'off');
}

function updateAppsScriptDot(status) {
  const dot = document.getElementById('driveSyncDot');
  if (!dot) return;
  dot.className = 'drive-sync-dot';
  if (status === 'synced') dot.classList.add('synced');
  else if (status === 'pending') dot.classList.add('pending');
  else if (status === 'error') dot.classList.add('error');
  else if (status === 'stale') dot.classList.add('stale');
  dot.style.display = isAppsScriptConfigured() ? 'inline-block' : 'none';
  dot.title = {
    synced: 'Drive sync: up-to-date',
    pending: 'Drive sync: menyimpan…',
    error: 'Drive sync: error',
    stale: 'Drive sync: data lokal lebih baru, perlu push',
    idle: 'Drive sync: idle',
    off: 'Drive sync: belum aktif'
  }[status] || 'Drive sync';
}

// ═══════════════════════════════════════════════════════════════════════════
// COMPUTATION
// ═══════════════════════════════════════════════════════════════════════════
function computeTring() {
  const buyback = state.tring.hargaBuybackSaatIni || 0;
  let modal = 0, nilai = 0, gramTotal = 0;
  const rows = state.tring.transactions.map(tx => {
    const m = (tx.hargaBeli || 0) * (tx.jumlahGram || 0);
    const n = buyback * (tx.jumlahGram || 0);
    const pl = n - m;
    modal += m; nilai += n; gramTotal += (tx.jumlahGram || 0);
    return {
      ...tx,
      modal: m,
      nilai: n,
      pl: pl,
      ret: m > 0 ? pl / m : 0,
      spread: (tx.hargaBeli || 0) - buyback
    };
  });
  return {
    rows, modal, nilai,
    pl: nilai - modal,
    ret: modal > 0 ? (nilai - modal) / modal : 0,
    gramTotal
  };
}

function computeBibit() {
  let modal = 0, nilai = 0;
  const rows = state.bibit.positions.map(p => {
    const unit = (p.navBeliAvg || 0) > 0 ? (p.modalTotal || 0) / p.navBeliAvg : 0;
    const n = unit * (p.navSekarang || 0);
    const pl = n - (p.modalTotal || 0);
    modal += (p.modalTotal || 0); nilai += n;
    return {
      ...p,
      unit: unit,
      nilai: n,
      pl: pl,
      ret: (p.modalTotal || 0) > 0 ? pl / p.modalTotal : 0
    };
  });
  return { rows, modal, nilai, pl: nilai - modal, ret: modal > 0 ? (nilai - modal) / modal : 0 };
}

function computeStockbit() {
  let modal = 0, nilai = 0;
  const rows = state.stockbit.positions.map(p => {
    const lembar = (p.totalLot || 0) * 100;
    const m = (p.hargaBeliAvg || 0) * lembar;
    const n = (p.hargaSekarang || 0) * lembar;
    const pl = n - m;
    modal += m; nilai += n;
    return {
      ...p, lembar, modal: m, nilai: n, pl,
      ret: m > 0 ? pl / m : 0
    };
  });
  return { rows, modal, nilai, pl: nilai - modal, ret: modal > 0 ? (nilai - modal) / modal : 0 };
}

function computeGotrade() {
  let modalUSD = 0, nilaiUSD = 0;
  const rows = state.gotrade.positions.map(p => {
    const m = (p.hargaBeliAvgUSD || 0) * (p.totalLembar || 0);
    const n = (p.hargaSekarangUSD || 0) * (p.totalLembar || 0) - (p.feeUSD || 0);
    const pl = n - m;
    modalUSD += m; nilaiUSD += n;
    return {
      ...p, modalUSD: m, nilaiUSD: n, plUSD: pl,
      ret: m > 0 ? pl / m : 0
    };
  });
  const kurs = state.settings.kursUsdIdr || 1;
  return {
    rows,
    modalUSD, nilaiUSD, plUSD: nilaiUSD - modalUSD,
    modal: modalUSD * kurs,
    nilai: nilaiUSD * kurs,
    pl: (nilaiUSD - modalUSD) * kurs,
    ret: modalUSD > 0 ? (nilaiUSD - modalUSD) / modalUSD : 0
  };
}

function computePluang() {
  let modal = 0, nilai = 0;
  const rows = state.pluang.positions.map(p => {
    const m = (p.hargaBeliAvg || 0) * (p.jumlahKoin || 0);
    const n = (p.hargaSekarang || 0) * (p.jumlahKoin || 0);
    const pl = n - m;
    modal += m; nilai += n;
    return { ...p, modal: m, nilai: n, pl, ret: m > 0 ? pl / m : 0 };
  });
  return { rows, modal, nilai, pl: nilai - modal, ret: modal > 0 ? (nilai - modal) / modal : 0 };
}

function computeAll() {
  const tring = computeTring();
  const bibit = computeBibit();
  const stockbit = computeStockbit();
  const gotrade = computeGotrade();
  const pluang = computePluang();

  // Cash balances (RDN = Rekening Dana Nasabah for Stockbit, Cash for GoTrade)
  // These count toward both modal and nilai equally — so they add to total
  // but don't affect P/L.
  const saldoRDN = Number(state.stockbit?.saldoRDN) || 0;
  const saldoCashUSD = Number(state.gotrade?.saldoCashUSD) || 0;
  const saldoCashIDR = saldoCashUSD * (state.settings.kursUsdIdr || 0);

  const totalModal = tring.modal + bibit.modal + stockbit.modal + gotrade.modal + pluang.modal + saldoRDN + saldoCashIDR;
  const totalNilai = tring.nilai + bibit.nilai + stockbit.nilai + gotrade.nilai + pluang.nilai + saldoRDN + saldoCashIDR;
  return {
    tring, bibit, stockbit, gotrade, pluang,
    saldoRDN, saldoCashUSD, saldoCashIDR,
    totalCash: saldoRDN + saldoCashIDR,
    totalModal, totalNilai,
    totalPL: totalNilai - totalModal,
    totalRet: totalModal > 0 ? (totalNilai - totalModal) / totalModal : 0
  };
}

// FORMATTING
// ═══════════════════════════════════════════════════════════════════════════
// Escape HTML special chars to prevent XSS when interpolating user-entered
// strings into innerHTML. Use for any user-controlled text (names, notes, etc.)
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function fmtIDR(n, opts = {}) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (opts.compact && abs >= 1_000_000_000) return (n / 1_000_000_000).toFixed(2) + ' M';
  if (opts.compact && abs >= 1_000_000) return (n / 1_000_000).toFixed(2) + ' jt';
  if (opts.compact && abs >= 1_000) return (n / 1_000).toFixed(1) + ' rb';
  return new Intl.NumberFormat('id-ID', { maximumFractionDigits: 0 }).format(Math.round(n));
}
// IDR with Rp prefix — for table cells where currency context isn't obvious
function fmtIDRp(n, opts = {}) {
  if (n == null || isNaN(n)) return '—';
  return 'Rp ' + fmtIDR(n, opts);
}
function fmtNum(n, dec = 2) {
  if (n == null || isNaN(n)) return '—';
  return new Intl.NumberFormat('id-ID', {
    minimumFractionDigits: dec, maximumFractionDigits: dec
  }).format(n);
}
function fmtUSD(n, dec = 2) {
  if (n == null || isNaN(n)) return '—';
  return '$' + new Intl.NumberFormat('en-US', {
    minimumFractionDigits: dec, maximumFractionDigits: dec
  }).format(n);
}
// Signed USD with explicit + or - sign
function fmtSignedUSD(n, dec = 2) {
  if (n == null || isNaN(n)) return '—';
  const sign = n > 0 ? '+' : (n < 0 ? '-' : '');
  return sign + '$' + new Intl.NumberFormat('en-US', {
    minimumFractionDigits: dec, maximumFractionDigits: dec
  }).format(Math.abs(n));
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  const v = n * 100;
  const sign = v > 0 ? '+' : '';
  return sign + v.toFixed(2) + '%';
}
function fmtSignedIDR(n) {
  if (n == null || isNaN(n)) return '—';
  const sign = n > 0 ? '+' : '';
  return sign + fmtIDR(n);
}
// Signed IDR with Rp prefix
function fmtSignedIDRp(n) {
  if (n == null || isNaN(n)) return '—';
  const sign = n > 0 ? '+' : (n < 0 ? '-' : '');
  return sign + 'Rp ' + fmtIDR(Math.abs(n));
}
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  if (isNaN(d)) return s;
  // DD/MM/YYYY format
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yyyy = d.getFullYear();
  return `${dd}/${mm}/${yyyy}`;
}
// Date + time in DD/MM/YYYY HH:MM format
function fmtDateTime(s) {
  if (!s) return '—';
  const d = new Date(s);
  if (isNaN(d)) return s;
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yyyy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${dd}/${mm}/${yyyy} ${hh}:${min}`;
}
function fmtDateInput(s) {
  if (!s) return '';
  return s.substring(0, 10); // YYYY-MM-DD
}
function plClass(n) { return n > 0 ? 'gain' : n < 0 ? 'loss' : 'neutral'; }

function formatRelativeTime(isoStr) {
  if (!isoStr) return '';
  const t = new Date(isoStr).getTime();
  if (isNaN(t)) return '';
  const diff = (Date.now() - t) / 1000;
  if (diff < 0) return 'di masa depan?';
  if (diff < 60) return 'baru saja';
  if (diff < 3600) return `${Math.floor(diff / 60)} menit lalu`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} jam lalu`;
  if (diff < 86400 * 30) return `${Math.floor(diff / 86400)} hari lalu`;
  if (diff < 86400 * 365) return `${Math.floor(diff / (86400 * 30))} bulan lalu`;
  return `${Math.floor(diff / (86400 * 365))} tahun lalu`;
}

// ═══════════════════════════════════════════════════════════════════════════
// DRAG & DROP REORDER — works on desktop (HTML5 DnD) and mobile (touch)
// ═══════════════════════════════════════════════════════════════════════════
let dragState = null;

function makeDraggable(container, platform) {
  // container is the <tbody> (desktop) or <div.mobile-cards> (mobile).
  // Items have data-id attribute; reorder applies to state[platform].positions
  // (or .transactions for tring).
  const items = Array.from(container.children).filter(el => el.dataset && el.dataset.id);

  items.forEach(item => {
    item.draggable = true;

    // Desktop drag events
    item.addEventListener('dragstart', e => {
      dragState = { platform, sourceId: item.dataset.id, container };
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      // Required for Firefox
      e.dataTransfer.setData('text/plain', item.dataset.id);
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      container.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => {
        el.classList.remove('drag-over-top', 'drag-over-bottom');
      });
      dragState = null;
    });
    item.addEventListener('dragover', e => {
      if (!dragState || dragState.platform !== platform) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const rect = item.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      item.classList.toggle('drag-over-top', e.clientY < midY);
      item.classList.toggle('drag-over-bottom', e.clientY >= midY);
    });
    item.addEventListener('dragleave', () => {
      item.classList.remove('drag-over-top', 'drag-over-bottom');
    });
    item.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragState || dragState.platform !== platform) return;
      const targetId = item.dataset.id;
      const sourceId = dragState.sourceId;
      if (sourceId === targetId) return;
      const rect = item.getBoundingClientRect();
      const dropAfter = e.clientY >= rect.top + rect.height / 2;
      reorderPlatformItem(platform, sourceId, targetId, dropAfter);
    });

    // Touch events for mobile (fallback for browsers without touch DnD)
    let touchStartY = 0, touchOffsetY = 0, touchClone = null, touchTargetItem = null;
    const handle = item.querySelector('.drag-handle');
    if (!handle) return;

    handle.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.touches[0];
      touchStartY = t.clientY;
      const rect = item.getBoundingClientRect();
      touchOffsetY = t.clientY - rect.top;
      dragState = { platform, sourceId: item.dataset.id, container };
      item.classList.add('dragging');
    }, { passive: false });

    handle.addEventListener('touchmove', e => {
      if (!dragState) return;
      e.preventDefault();
      const t = e.touches[0];
      // Find element being hovered
      const elBelow = document.elementFromPoint(t.clientX, t.clientY);
      const targetItem = elBelow?.closest('[data-id]');
      // Clear all previous indicators
      container.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => {
        el.classList.remove('drag-over-top', 'drag-over-bottom');
      });
      if (targetItem && targetItem !== item && targetItem.parentElement === container) {
        const rect = targetItem.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        targetItem.classList.toggle('drag-over-top', t.clientY < midY);
        targetItem.classList.toggle('drag-over-bottom', t.clientY >= midY);
        touchTargetItem = { item: targetItem, dropAfter: t.clientY >= midY };
      }
    }, { passive: false });

    handle.addEventListener('touchend', e => {
      if (!dragState) return;
      item.classList.remove('dragging');
      container.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => {
        el.classList.remove('drag-over-top', 'drag-over-bottom');
      });
      if (touchTargetItem) {
        reorderPlatformItem(platform, dragState.sourceId, touchTargetItem.item.dataset.id, touchTargetItem.dropAfter);
      }
      dragState = null;
      touchTargetItem = null;
    });
  });
}

function reorderPlatformItem(platform, sourceId, targetId, dropAfter) {
  const list = platform === 'tring'
    ? state.tring.transactions
    : state[platform].positions;
  const sourceIdx = list.findIndex(x => x.id === sourceId);
  const targetIdx = list.findIndex(x => x.id === targetId);
  if (sourceIdx === -1 || targetIdx === -1) return;

  const [moved] = list.splice(sourceIdx, 1);
  // After the splice, the target's index might have shifted by -1 if it was after the source
  let newIdx = list.findIndex(x => x.id === targetId);
  if (dropAfter) newIdx++;
  list.splice(newIdx, 0, moved);

  saveState();
  // Re-render the current tab
  if (platform === 'tring') renderTring();
  else if (platform === 'bibit') renderBibit();
  else if (platform === 'stockbit') renderStockbit();
  else if (platform === 'gotrade') renderGotrade();
  else if (platform === 'pluang') renderPluang();
}

function attachDragHandlers(platform) {
  // Find tbody and mobile-cards containers in the active platform view
  const view = document.getElementById(`view-${platform}`);
  if (!view) return;
  const tbody = view.querySelector('.data-table tbody');
  const mcards = view.querySelector('.mobile-cards');
  if (tbody) makeDraggable(tbody, platform);
  if (mcards) makeDraggable(mcards, platform);
}
function statusPill(pl) {
  if (pl > 0) return '<span class="pill gain">✓ Untung</span>';
  if (pl < 0) return '<span class="pill loss">▼ Rugi</span>';
  return '<span class="pill neutral">— BEP</span>';
}

// ═══════════════════════════════════════════════════════════════════════════
// CHARTS (inline SVG, no library)
// ═══════════════════════════════════════════════════════════════════════════
function renderDonut(segments, size = 220) {
  // segments: [{label, value, color}]
  const total = segments.reduce((s, x) => s + x.value, 0);
  if (total <= 0) {
    return `<svg viewBox="0 0 ${size} ${size}" style="width:100%;height:100%">
      <circle cx="${size/2}" cy="${size/2}" r="${size/2-20}" fill="none" stroke="var(--hairline)" stroke-width="20"/>
      <text x="${size/2}" y="${size/2}" text-anchor="middle" dy="0.35em" fill="var(--muted)" font-size="12">Tidak ada data</text>
    </svg>`;
  }
  const cx = size / 2, cy = size / 2;
  const r = size / 2 - 22;
  const thickness = 22;
  let startAngle = -Math.PI / 2;
  const paths = segments.map((seg, i) => {
    const frac = seg.value / total;
    const endAngle = startAngle + frac * Math.PI * 2;
    const x1 = cx + r * Math.cos(startAngle);
    const y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle);
    const y2 = cy + r * Math.sin(endAngle);
    const large = frac > 0.5 ? 1 : 0;
    const p = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
    const out = `<path d="${p}" fill="none" stroke="${seg.color}" stroke-width="${thickness}" stroke-linecap="butt"/>`;
    startAngle = endAngle;
    return out;
  }).join('');
  // Center label
  const totalStr = fmtIDR(total, {compact: true});
  return `<svg viewBox="0 0 ${size} ${size}" style="width:100%;height:100%">
    ${paths}
    <text x="${cx}" y="${cy - 4}" text-anchor="middle" fill="var(--muted)" font-size="10"
          font-family="var(--sans)" style="font-variant:small-caps; letter-spacing:0.1em">Total</text>
    <text x="${cx}" y="${cy + 14}" text-anchor="middle" fill="var(--ink)" font-size="14"
          font-family="var(--serif)" font-weight="600">Rp ${totalStr}</text>
  </svg>`;
}

function renderBarChart(bars, opts = {}) {
  // bars: [{label, value, color}]
  const width = 600, height = 220;
  const padTop = 20, padBottom = 36, padLeft = 44, padRight = 16;
  const chartW = width - padLeft - padRight;
  const chartH = height - padTop - padBottom;

  const vals = bars.map(b => b.value);
  const maxV = Math.max(0, ...vals);
  const minV = Math.min(0, ...vals);
  const range = (maxV - minV) || 1;
  const zeroY = padTop + chartH * (maxV / range);

  const bw = chartW / bars.length * 0.55;
  const gap = chartW / bars.length * 0.45;

  const barElements = bars.map((b, i) => {
    const x = padLeft + i * (bw + gap) + gap / 2;
    const h = Math.abs(b.value) / range * chartH;
    const y = b.value >= 0 ? zeroY - h : zeroY;
    const labelY = b.value >= 0 ? y - 6 : y + h + 14;
    return `
      <rect x="${x}" y="${y}" width="${bw}" height="${h}" fill="${b.color}" rx="2"/>
      <text x="${x + bw / 2}" y="${labelY}" text-anchor="middle" class="chart-bar-label"
            fill="${b.value < 0 ? 'var(--loss)' : 'var(--gain)'}">
        ${opts.fmt ? opts.fmt(b.value) : fmtIDR(b.value, {compact: true})}
      </text>
      <text x="${x + bw / 2}" y="${height - 8}" text-anchor="middle" class="chart-axis-label">${b.label}</text>
    `;
  }).join('');

  // Zero line
  const zeroLine = `<line x1="${padLeft}" x2="${width - padRight}" y1="${zeroY}" y2="${zeroY}"
                         stroke="var(--hairline-strong)" stroke-width="1"/>`;

  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:100%">
    ${zeroLine}
    ${barElements}
  </svg>`;
}

function renderLineChart(points, opts = {}) {
  // points: [{x: Date/string, y: number}]
  const width = 600, height = 220;
  const padTop = 20, padBottom = 30, padLeft = 50, padRight = 16;
  const chartW = width - padLeft - padRight;
  const chartH = height - padTop - padBottom;

  if (points.length < 2) {
    return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:100%">
      <text x="${width/2}" y="${height/2}" text-anchor="middle" fill="var(--muted)" font-size="12">
        Butuh minimal 2 snapshot untuk menampilkan grafik
      </text>
    </svg>`;
  }

  const ys = points.map(p => p.y);
  const maxY = Math.max(...ys) * 1.05;
  const minY = Math.min(...ys) * 0.95;
  const rangeY = (maxY - minY) || 1;

  const sx = i => padLeft + (i / (points.length - 1)) * chartW;
  const sy = v => padTop + chartH - ((v - minY) / rangeY) * chartH;

  // Grid lines
  const gridLines = [0, 0.25, 0.5, 0.75, 1].map(f => {
    const y = padTop + chartH * f;
    const v = maxY - f * rangeY;
    return `
      <line x1="${padLeft}" x2="${width-padRight}" y1="${y}" y2="${y}" class="chart-grid-line"/>
      <text x="${padLeft - 6}" y="${y+3}" text-anchor="end" class="chart-axis-label">${fmtIDR(v, {compact:true})}</text>
    `;
  }).join('');

  // Line path
  const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${sx(i)} ${sy(p.y)}`).join(' ');
  // Area path
  const areaD = pathD + ` L ${sx(points.length - 1)} ${padTop + chartH} L ${sx(0)} ${padTop + chartH} Z`;

  // X-axis labels (show max 6)
  const step = Math.max(1, Math.ceil(points.length / 6));
  const xLabels = points.filter((_, i) => i % step === 0 || i === points.length - 1)
    .map((p, i, arr) => {
      const origIdx = points.indexOf(p);
      return `<text x="${sx(origIdx)}" y="${height - 8}" text-anchor="middle" class="chart-axis-label">${p.label || p.x}</text>`;
    }).join('');

  const dots = points.map((p, i) =>
    `<circle cx="${sx(i)}" cy="${sy(p.y)}" r="3" fill="var(--accent)"/>`
  ).join('');

  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:100%">
    ${gridLines}
    <path d="${areaD}" fill="var(--accent-bg)" opacity="0.5"/>
    <path d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="2"/>
    ${dots}
    ${xLabels}
  </svg>`;
}

// DASHBOARD VIEW
