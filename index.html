function renderDashboard() {
  const c = computeAll();
  const platforms = [
    { key: 'tring', name: 'Tring! Emas', sub: 'Logam mulia', icon: '🪙', color: 'var(--tring)', data: c.tring },
    { key: 'bibit', name: 'Bibit', sub: 'Reksa dana', icon: '🌱', color: 'var(--bibit)', data: c.bibit },
    { key: 'stockbit', name: 'Stockbit', sub: 'Saham IDX', icon: '📈', color: 'var(--stockbit)', data: c.stockbit },
    { key: 'gotrade', name: 'GoTrade', sub: `Saham US ($${fmtNum(c.gotrade.nilaiUSD,2)})`, icon: '🇺🇸', color: 'var(--gotrade)', data: c.gotrade },
    { key: 'pluang', name: 'Pluang', sub: 'Crypto', icon: '₿', color: 'var(--pluang)', data: c.pluang }
  ];

  // Hero
  const hero = `
    <div class="hero-card">
      <div class="hero-label">Total Nilai Portofolio</div>
      <div class="hero-value">
        <span class="hero-currency">Rp</span>${fmtIDR(c.totalNilai)}
      </div>
      <div class="hero-delta ${c.totalPL >= 0 ? 'gain' : 'loss'}">
        <span class="hero-delta-arrow">${c.totalPL >= 0 ? '▲' : '▼'}</span>
        ${fmtSignedIDR(c.totalPL)}
        &nbsp;&nbsp;<span style="opacity:0.8">(${fmtPct(c.totalRet)})</span>
      </div>
      <div class="hero-stats">
        <div>
          <div class="hero-stat-label">Modal</div>
          <div class="hero-stat-value">Rp ${fmtIDR(c.totalModal)}</div>
        </div>
        <div>
          <div class="hero-stat-label">Profit/Loss</div>
          <div class="hero-stat-value ${c.totalPL >= 0 ? '' : ''}" style="color:${c.totalPL >= 0 ? '#6FCBAE' : '#E28A8A'}">
            ${fmtSignedIDR(c.totalPL)}
          </div>
        </div>
        <div>
          <div class="hero-stat-label">Return</div>
          <div class="hero-stat-value" style="color:${c.totalPL >= 0 ? '#6FCBAE' : '#E28A8A'}">${fmtPct(c.totalRet)}</div>
        </div>
        <div>
          <div class="hero-stat-label">Posisi Aktif</div>
          <div class="hero-stat-value">
            ${c.tring.rows.length + c.bibit.rows.length + c.stockbit.rows.length + c.gotrade.rows.length + c.pluang.rows.length}
          </div>
        </div>
      </div>
    </div>
  `;

  // Allocation bar
  const allocBar = c.totalNilai > 0 ? `
    <div class="allocation-bar">
      ${platforms.map(p => {
        const frac = c.totalNilai > 0 ? (p.data.nilai / c.totalNilai) : 0;
        return `<div class="allocation-seg" style="width:${frac*100}%; background:${p.color}" title="${p.name}: ${(frac*100).toFixed(1)}%"></div>`;
      }).join('')}
    </div>
  ` : '';

  // Platform breakdown table
  const platformRows = platforms.map(p => {
    const frac = c.totalNilai > 0 ? (p.data.nilai / c.totalNilai) : 0;
    return `
      <tr onclick="switchTab('${p.key}')" style="cursor:pointer">
        <td>
          <div class="platform-row-name">
            <span class="platform-row-indicator" style="background:${p.color}"></span>
            <span class="platform-row-name-text">
              <span class="platform-row-name-main">${p.icon} ${p.name}</span>
              <span class="platform-row-name-sub">${p.sub}</span>
            </span>
          </div>
        </td>
        <td class="num">
          <div style="font-weight:500">Rp ${fmtIDR(p.data.nilai)}</div>
          <div style="font-size:0.72rem;color:var(--muted);margin-top:1px">
            ${(frac*100).toFixed(1)}%
          </div>
        </td>
        <td class="num">
          <div style="color:${p.data.pl >= 0 ? 'var(--gain)' : 'var(--loss)'};font-weight:500">
            ${fmtSignedIDR(p.data.pl)}
          </div>
          <div style="font-size:0.72rem;color:${p.data.pl >= 0 ? 'var(--gain)' : 'var(--loss)'};margin-top:1px">
            ${fmtPct(p.data.ret)}
          </div>
        </td>
      </tr>
    `;
  }).join('');

  // Donut chart segments
  const donutSegments = platforms
    .filter(p => p.data.nilai > 0)
    .map(p => ({ label: p.name, value: p.data.nilai, color: p.color }));

  // P/L bar chart
  const plBars = platforms.map(p => ({
    label: p.icon,
    value: p.data.pl,
    color: p.data.pl >= 0 ? 'var(--gain)' : 'var(--loss)'
  }));

  // Rebalancing alerts
  const target = state.settings.targetAllocation;
  const alerts = platforms.map(p => {
    const actual = c.totalNilai > 0 ? p.data.nilai / c.totalNilai : 0;
    const targ = target[p.key] || 0;
    const dev = actual - targ;
    return { ...p, actual, targ, dev };
  }).filter(a => Math.abs(a.dev) > 0.05); // 5% threshold

  const alertsHtml = alerts.length === 0
    ? `<div class="rebalance-alert ok">
         <span>✓</span>
         <div>Alokasi portofolio seimbang dengan target (toleransi 5%)</div>
       </div>`
    : alerts.map(a => {
        const direction = a.dev > 0 ? 'lebih' : 'kurang';
        return `<div class="rebalance-alert">
          <span style="color:${a.color}">◆</span>
          <div>
            <strong>${a.name}</strong> ${direction} <strong>${(Math.abs(a.dev) * 100).toFixed(1)}%</strong>
            dari target (${(a.targ*100).toFixed(0)}% → aktual ${(a.actual*100).toFixed(1)}%)
          </div>
        </div>`;
      }).join('');

  // Snapshot trend (mini chart) if available
  const snapChart = state.snapshots.length >= 2
    ? renderLineChart(state.snapshots.slice(-30).map(s => ({
        x: s.date, y: s.totalNilai,
        label: s.date.substring(5) // MM-DD
      })))
    : `<div class="empty-state" style="padding:20px">
         <span class="emoji">📊</span>
         Belum ada riwayat cukup.<br>
         <span style="font-size:0.75rem;color:var(--muted)">
           Snapshot otomatis direkam setiap hari.
         </span>
       </div>`;

  // Cash balance editable cards
  const cashCards = `
    <div class="cash-grid">
      <div class="cash-card">
        <div class="cash-card-head">
          <span class="cash-card-icon" style="color:var(--stockbit)">💼</span>
          <div>
            <div class="cash-card-label">Saldo RDN</div>
            <div class="cash-card-sub">Rekening Dana Nasabah · Stockbit</div>
          </div>
        </div>
        <div class="cash-card-input-wrap">
          <span class="cash-card-currency">Rp</span>
          <input type="number" class="cash-card-input" value="${c.saldoRDN || ''}" placeholder="0"
                 step="1000" onchange="updateCashBalance('stockbit', this.value)">
        </div>
      </div>
      <div class="cash-card">
        <div class="cash-card-head">
          <span class="cash-card-icon" style="color:var(--gotrade)">💵</span>
          <div>
            <div class="cash-card-label">Saldo Cash GoTrade</div>
            <div class="cash-card-sub">Dalam USD · ≈ Rp ${fmtIDR(c.saldoCashIDR)}</div>
          </div>
        </div>
        <div class="cash-card-input-wrap">
          <span class="cash-card-currency">$</span>
          <input type="number" class="cash-card-input" value="${c.saldoCashUSD || ''}" placeholder="0.00"
                 step="0.01" onchange="updateCashBalance('gotrade', this.value)">
        </div>
      </div>
    </div>
  `;

  document.getElementById('view-dashboard').innerHTML = `
    ${hero}
    ${cashCards}

    <div class="grid-2">
      <div class="card">
        <div class="card-title">
          Alokasi Portofolio
          <span class="card-title-meta">per platform</span>
        </div>
        ${allocBar}
        <div class="chart-wrap" style="margin:10px 0 16px;height:240px">
          ${renderDonut(donutSegments)}
        </div>
        <table class="platform-table">
          <tbody>${platformRows}</tbody>
        </table>
      </div>

      <div class="card">
        <div class="card-title">
          Profit/Loss per Platform
          <span class="card-title-meta">unrealized</span>
        </div>
        <div class="chart-wrap">${renderBarChart(plBars)}</div>
        <div style="margin-top:18px">
          <div style="font-size:0.75rem;font-variant:small-caps;letter-spacing:0.1em;color:var(--muted-strong);font-weight:600;margin-bottom:10px">Rebalancing Alerts</div>
          ${alertsHtml}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        Tren Nilai Portofolio
        <span class="card-title-meta">30 snapshot terakhir</span>
      </div>
      <div class="chart-wrap" style="height:240px">${snapChart}</div>
    </div>
  `;
}

      <td class="num">${fmtIDRp(r.nilai)}</td>

        <button class="delete-btn" onclick="deleteTring('${r.id}')" title="Hapus">✕</button>
      </td>

  `).join('');

  const mobileCards = c.rows.map((r, i) => `
    <div class="mcard" data-id="${r.id}">
      <span class="drag-handle" title="Drag untuk ubah urutan">⋮⋮</span>
      <div class="mcard-head">

          <div class="mcard-subtitle">${esc(r.keterangan || `Transaksi #${i+1}`)}</div>
        </div>
        <div style="text-align:right">
          <div class="mcard-value ${plClass(r.pl)}" style="font-weight:600;font-size:1rem">${fmtSignedIDRp(r.pl)}</div>
          <div class="mcard-value ${plClass(r.pl)}" style="font-size:0.72rem">${fmtPct(r.ret)}</div>
        </div>
      </div>
      <div class="mcard-grid">
        <div class="mcard-field"><div class="mcard-label">Harga Beli</div>
          <div class="mcard-value"><input type="number" value="${r.hargaBeli || ''}" data-id="${r.id}" data-field="hargaBeli" onchange="updateTring(this)" step="1"></div></div>
        <div class="mcard-field"><div class="mcard-label">Jumlah (gr)</div>

        <button class="btn btn-danger" onclick="deleteTring('${r.id}')">Hapus</button>
      </div>
    </div>
  `).join('');

  const content = c.rows.length === 0
    ? `<div class="empty-state"><span class="emoji">🪙</span>Belum ada transaksi emas. Tekan "Tambah" untuk mulai.</div>`
    : `
      <div class="data-table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:36px"></th><th>#</th><th>Tanggal</th><th>Keterangan</th>

  document.getElementById('view-tring').innerHTML = `
    <div class="data-toolbar">
      <div>
        <div class="section-title">🪙 Tring! (Emas)</div>
        <div class="section-subtitle">Transaction log — setiap pembelian emas dicatat terpisah dengan harga buyback sebagai harga jual saat ini</div>
      </div>
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="addTring()">＋ Tambah</button>
    </div>
    ${summary}
    ${content}
  `;
  attachDragHandlers('tring');
}

        <div style="flex:1">

          <div class="mcard-subtitle">${esc(r.jenis || '—')}</div>

        <div style="text-align:right">

      </div>

        <div class="mcard-field" style="grid-column:1/-1"><div class="mcard-label">Jenis</div>

        <div class="mcard-field"><div class="mcard-label">NAV Beli Avg</div>

          <div class="mcard-value">${fmtNum(r.unit, 4)}</div></div>
        <div class="mcard-field"><div class="mcard-label">NAV Sekarang</div>
          <div class="mcard-value"><input type="number" value="${r.navSekarang || ''}" data-id="${r.id}" data-field="navSekarang" onchange="updateBibit(this)" step="0.0001"></div></div>
        <div class="mcard-field" style="grid-column:1/-1"><div class="mcard-label">Nilai</div>

  const content = c.rows.length === 0
    ? `<div class="empty-state"><span class="emoji">🌱</span>Belum ada reksa dana.</div>`
    : `

            <th style="width:36px"></th><th>#</th><th>Nama Reksa Dana</th><th>Jenis</th>

  document.getElementById('view-bibit').innerHTML = `
    <div class="data-toolbar">
      <div>
        <div class="section-title">🌱 Bibit (Reksa Dana)</div>
        <div class="section-subtitle">Position-based — satu baris per produk reksa dana dengan NAV rata-rata</div>
      </div>
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="addBibit()">＋ Tambah</button>
    </div>
    ${summary}
    ${content}
  `;
  attachDragHandlers('bibit');
}

// HISTORY / SNAPSHOTS VIEW
// ═══════════════════════════════════════════════════════════════════════════
function renderHistory() {
  const snaps = [...state.snapshots].sort((a, b) => b.date.localeCompare(a.date));

  const chart = snaps.length >= 2
    ? renderLineChart(snaps.slice().reverse().map(s => ({
        x: s.date, y: s.totalNilai, label: s.date.substring(5)
      })))
    : `<div class="empty-state"><span class="emoji">📈</span>Butuh minimal 2 snapshot</div>`;

  const entries = snaps.map((s, i) => {
    const prev = snaps[i + 1];
    const delta = prev ? s.totalNilai - prev.totalNilai : 0;
    const deltaPct = prev && prev.totalNilai ? delta / prev.totalNilai : 0;
    return `
      <div class="snap-entry">
        <div class="snap-date">${fmtDate(s.date)}</div>
        <div class="snap-value">
          Rp ${fmtIDR(s.totalNilai)}
          <span style="color:var(--muted);font-size:0.75rem">· modal Rp ${fmtIDR(s.totalModal)}</span>
        </div>
        ${prev ? `<div class="snap-delta ${plClass(delta)}">${delta >= 0 ? '▲' : '▼'} ${fmtSignedIDR(delta)} (${fmtPct(deltaPct)})</div>` : '<div class="snap-delta" style="color:var(--muted)">—</div>'}
      </div>
    `;
  }).join('');

  document.getElementById('view-history').innerHTML = `
    <div class="data-toolbar">
      <div>
        <div class="section-title">Riwayat Nilai Portofolio</div>
        <div class="section-subtitle">Snapshot otomatis saat app dibuka (maksimal 1x/hari) · Total: ${snaps.length}</div>
      </div>
      <div style="flex:1"></div>
      <button class="btn" onclick="takeSnapshotManual()">＋ Snapshot Manual</button>
      ${snaps.length > 0 ? `<button class="btn btn-danger" onclick="clearSnapshots()">Hapus Semua</button>` : ''}
    </div>
    <div class="card">
      <div class="card-title">Tren <span class="card-title-meta">nilai total IDR</span></div>
      <div class="chart-wrap" style="height:280px">${chart}</div>
    </div>
    ${snaps.length > 0 ? `
      <div class="card" style="margin-top:20px">
        <div class="card-title">Detail Snapshot</div>
        <div class="snap-timeline">${entries}</div>
      </div>
    ` : ''}
  `;
}

// ═══════════════════════════════════════════════════════════════════════════
// CRUD OPERATIONS
// ═══════════════════════════════════════════════════════════════════════════
function genId(prefix) { return `${prefix}-${Date.now()}-${Math.floor(Math.random()*1000)}`; }
function parseNum(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }

// Tring
function updateTring(el) {
  const id = el.dataset.id;
  const field = el.dataset.field;
  const tx = state.tring.transactions.find(t => t.id === id);
  if (!tx) return;
  tx[field] = (field === 'hargaBeli' || field === 'jumlahGram') ? parseNum(el.value) : el.value;
  saveState();
  renderTring();
  updateTabBadges();
}
function addTring() {
  state.tring.transactions.push({
    id: genId('tring'), tanggal: new Date().toISOString().substring(0,10),
    keterangan: '', hargaBeli: 0, jumlahGram: 0
  });
  saveState(); renderTring(); updateTabBadges();
  toast('Baris ditambah');
}
function deleteTring(id) {
  if (!confirm('Hapus transaksi ini?')) return;
  state.tring.transactions = state.tring.transactions.filter(t => t.id !== id);
  saveState(); renderTring(); updateTabBadges();
  toast('Dihapus');
}
function updateBuyback(v) {
  state.tring.hargaBuybackSaatIni = parseNum(v);
  saveState(); renderTring(); renderDashboard();
}

// Bibit
function updateBibit(el) {
  const id = el.dataset.id;
  const field = el.dataset.field;
  const p = state.bibit.positions.find(x => x.id === id);
  if (!p) return;
  const isNum = ['navBeliAvg', 'modalTotal', 'navSekarang'].includes(field);
  p[field] = isNum ? parseNum(el.value) : el.value;
  saveState(); renderBibit(); updateTabBadges();
}
function addBibit() {
  state.bibit.positions.push({
    id: genId('bibit'), nama: '', jenis: '', navBeliAvg: 0, modalTotal: 0, navSekarang: 0
  });
  saveState(); renderBibit(); updateTabBadges();
  toast('Reksa dana ditambah');
}

  if (!confirm('Hapus reksa dana ini?')) return;
  state.bibit.positions = state.bibit.positions.filter(x => x.id !== id);
  saveState(); renderBibit(); updateTabBadges();

}

// Pluang
function updateCashBalance(platform, value) {
  const num = parseNum(value);
  if (platform === 'stockbit') {
    if (!state.stockbit) state.stockbit = { positions: [] };
    state.stockbit.saldoRDN = num;
  } else if (platform === 'gotrade') {
    if (!state.gotrade) state.gotrade = { positions: [] };
    state.gotrade.saldoCashUSD = num;
  }
  saveState();
  renderDashboard();
  updateTabBadges();
}

  const id = el.dataset.id; const field = el.dataset.field;

  saveState(); renderPluang(); updateTabBadges();

function takeSnapshot(force = false) {
  const today = new Date().toISOString().substring(0, 10);
  const existing = state.snapshots.find(s => s.date === today);
  if (existing && !force) return; // max 1 per day unless forced

  const c = computeAll();
  const snap = {
    date: today,
    totalModal: c.totalModal,
    totalNilai: c.totalNilai,
    totalPL: c.totalPL,
    byPlatform: {
      tring: { modal: c.tring.modal, nilai: c.tring.nilai },
      bibit: { modal: c.bibit.modal, nilai: c.bibit.nilai },
      stockbit: { modal: c.stockbit.modal, nilai: c.stockbit.nilai },
      gotrade: { modalUSD: c.gotrade.modalUSD, nilaiUSD: c.gotrade.nilaiUSD, modalIDR: c.gotrade.modal, nilaiIDR: c.gotrade.nilai },
      pluang: { modal: c.pluang.modal, nilai: c.pluang.nilai }
    }
  };

  if (existing) {
    Object.assign(existing, snap);
  } else {
    state.snapshots.push(snap);
  }

  // Keep last 365
  if (state.snapshots.length > 365) {
    state.snapshots = state.snapshots.slice(-365);
  }
  saveState();
}
function takeSnapshotManual() {
  takeSnapshot(true);
  renderHistory();
  toast('Snapshot direkam');
}
function clearSnapshots() {
  if (!confirm('Hapus semua snapshot?')) return;
  state.snapshots = [];
  saveState(); renderHistory();
  toast('Snapshot dibersihkan');
}

function exportJSON() {

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().substring(0, 10);
  a.href = url;
  a.download = `portfolio-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('JSON ter-download');
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.version || !data.tring) throw new Error('Format tidak valid');
        if (!confirm(`Import akan mengganti data saat ini.\n\nLast Modified file: ${data.lastModified || 'unknown'}\n\nLanjutkan?`)) return;
        // Preserve device-specific config (URL, token, sheet URLs)
        const localAppsScript = JSON.parse(JSON.stringify(state.settings.appsScript || {}));
        const localSheetsSyncUrls = JSON.parse(JSON.stringify(state.settings.sheetsSyncUrls || {}));
        state = data;
        if (!state.snapshots) state.snapshots = [];
        if (!state.settings) state.settings = {};
        // Restore Apps Script config (always keep local — it's per-device)
        if (localAppsScript.url || localAppsScript.token) {
          state.settings.appsScript = localAppsScript;
        }
        // Restore sheet URLs only if imported file doesn't have them
        if (!state.settings.sheetsSyncUrls || Object.keys(state.settings.sheetsSyncUrls).length === 0) {
          state.settings.sheetsSyncUrls = localSheetsSyncUrls;
        }
        saveState();
        render();
        toast('Data ter-import');
      } catch (err) {
        alert('File tidak valid: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ═══════════════════════════════════════════════════════════════════════════
// FILE SYSTEM ACCESS API (Auto-sync to Google Drive folder)
// ═══════════════════════════════════════════════════════════════════════════
let autoSyncTimer = null;

async function connectSyncFolder() {
  if (!window.showDirectoryPicker) {
    alert('Browser Anda tidak mendukung Folder Sync.\n\nGunakan Chrome/Edge di desktop.\nDi mobile, pakai Export/Import JSON manual.');
    return;
  }
  try {
    const handle = await window.showDirectoryPicker({
      mode: 'readwrite',
      startIn: 'documents'
    });
    fileHandle = handle;
    // Save handle to IndexedDB for persistence (localStorage can't store FileHandles)
    await saveFileHandle(handle);

    // On first connect, check if there's an existing portfolio.json to merge
    try {
      const file = await getFile();
      if (file) {
        const remoteText = await file.text();
        const remote = JSON.parse(remoteText);
        if (remote && remote.version) {
          const localTime = new Date(state.lastModified || 0).getTime();
          const remoteTime = new Date(remote.lastModified || 0).getTime();
          if (remoteTime > localTime) {
            if (confirm(`File di folder lebih baru (${fmtDateTime(remote.lastModified)}).\n\nPakai data dari folder?`)) {
              const localAppsScript = JSON.parse(JSON.stringify(state.settings.appsScript || {}));
              const localSheetsSyncUrls = JSON.parse(JSON.stringify(state.settings.sheetsSyncUrls || {}));
              state = remote;
              if (!state.snapshots) state.snapshots = [];
              if (!state.settings) state.settings = {};
              state.settings.appsScript = localAppsScript;
              if (!state.settings.sheetsSyncUrls || Object.keys(state.settings.sheetsSyncUrls).length === 0) {
                state.settings.sheetsSyncUrls = localSheetsSyncUrls;
              }
              saveState(true, false); // preserve remote timestamp
              render();
              toast('Data di-sync dari folder');
              renderSettings();
              return;
            }
          }
        }
      }
    } catch (e) { /* no existing file, that's fine */ }

    // Write current state to folder
    await writeToFolder();
    toast('Folder sync aktif');
    renderSettings();
  } catch (err) {
    if (err.name !== 'AbortError') {
      console.error(err);
      alert('Gagal: ' + err.message);
    }
  }
}

async function getFile() {
  if (!fileHandle) return null;
  try {
    const handle = await fileHandle.getFileHandle('portfolio.json', { create: false });
    return await handle.getFile();
  } catch (e) { return null; }
}

async function writeToFolder() {
  if (!fileHandle) return;
  try {
    const handle = await fileHandle.getFileHandle('portfolio.json', { create: true });
    const writable = await handle.createWritable();
    await writable.write(JSON.stringify(state, null, 2));
    await writable.close();
    updateSyncDot('synced');
  } catch (e) {
    console.error('Write failed:', e);
    updateSyncDot('idle');
  }
}

function scheduleAutoSync() {
  if (!fileHandle) return;
  updateSyncDot('pending');
  if (autoSyncTimer) clearTimeout(autoSyncTimer);
  autoSyncTimer = setTimeout(writeToFolder, 1500);
}

// IndexedDB for storing FileHandle
function saveFileHandle(handle) {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('portfolio-sync-db', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('handles');
    req.onsuccess = () => {
      const tx = req.result.transaction('handles', 'readwrite');
      tx.objectStore('handles').put(handle, FILE_HANDLE_KEY);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    };
    req.onerror = () => reject(req.error);
  });
}

function loadFileHandle() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('portfolio-sync-db', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('handles');
    req.onsuccess = () => {
      const tx = req.result.transaction('handles', 'readonly');
      const g = tx.objectStore('handles').get(FILE_HANDLE_KEY);
      g.onsuccess = () => resolve(g.result || null);
      g.onerror = () => resolve(null);
    };
    req.onerror = () => resolve(null);
  });
}

async function verifyPermission(handle) {
  if (!handle.queryPermission) return true; // older API
  const opts = { mode: 'readwrite' };
  if ((await handle.queryPermission(opts)) === 'granted') return true;
  if ((await handle.requestPermission(opts)) === 'granted') return true;
  return false;
}

async function initSync() {
  try {
    const saved = await loadFileHandle();
    if (!saved) { updateSyncDot('idle'); return; }
    const ok = await verifyPermission(saved);
    if (!ok) { updateSyncDot('idle'); return; }
    fileHandle = saved;

    // Pull latest from folder if newer
    try {
      const file = await getFile();
      if (file) {
        const text = await file.text();
        const remote = JSON.parse(text);
        const localTime = new Date(state.lastModified || 0).getTime();
        const remoteTime = new Date(remote.lastModified || 0).getTime();
        if (remoteTime > localTime + 1000) {
          const localAppsScript = JSON.parse(JSON.stringify(state.settings.appsScript || {}));
          const localSheetsSyncUrls = JSON.parse(JSON.stringify(state.settings.sheetsSyncUrls || {}));
          state = remote;
          if (!state.snapshots) state.snapshots = [];
          if (!state.settings) state.settings = {};
          state.settings.appsScript = localAppsScript;
          if (!state.settings.sheetsSyncUrls || Object.keys(state.settings.sheetsSyncUrls).length === 0) {
            state.settings.sheetsSyncUrls = localSheetsSyncUrls;
          }
          saveState(true, false); // preserve remote timestamp
          render();
          toast('Data di-pull dari sync folder');
          return;
        }
      }
    } catch (e) { /* no file yet */ }

    updateSyncDot('synced');
  } catch (e) {
    console.warn('Sync init failed:', e);
    updateSyncDot('idle');
  }
}

function updateSyncDot(status) {
  const dot = document.getElementById('syncDot');
  dot.classList.remove('synced', 'pending');
  if (status === 'synced') dot.classList.add('synced');
  if (status === 'pending') dot.classList.add('pending');
  dot.title = fileHandle
    ? (status === 'synced' ? 'Sync ke folder: up-to-date' :
       status === 'pending' ? 'Menyimpan ke folder…' : 'Sync tidak aktif')
    : 'Sync folder belum diatur';
}

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
function init() {
  initState();

  // Wire up kurs input
  document.getElementById('kursInput').value = state.settings.kursUsdIdr || 16000;
  document.getElementById('kursInput').addEventListener('change', e => updateKurs(e.target.value));

  // Tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => switchTab(t.dataset.tab));
  });

  // Menu
  document.getElementById('menuBtn').addEventListener('click', showMenu);

  // FAB
  document.getElementById('fabBtn').addEventListener('click', fabAdd);

  // Modal backdrop
  document.getElementById('modalBackdrop').addEventListener('click', e => {
    if (e.target.id === 'modalBackdrop') closeModal();
  });

  // Show/hide header refresh button based on whether any sync is configured
  const hasSheetsUrls = Object.values(state.settings.sheetsSyncUrls || {}).some(v => v);
  const hasDrive = isAppsScriptConfigured();
  document.getElementById('refreshBtn').style.display = (hasSheetsUrls || hasDrive) ? 'inline-flex' : 'none';

  // Take automatic daily snapshot
  setTimeout(() => takeSnapshot(false), 500);

  // Initial render
  render();

  // Try to reconnect sync folder (laptop File System API)
  initSync();

  // PRIMARY: Auto-pull from GitHub (works everywhere, including mobile)
  if (isGithubConfigured()) {
    if (getGithubConfig().autoPull) {
      setTimeout(async () => {
        // Capture local time BEFORE pull (used to detect "local has unpushed edits")
        const localTimeBefore = new Date(state.lastModified || 0).getTime();
        const localContent = JSON.stringify(state);

        // Try to fetch remote without applying yet
        const file = await githubGetFile('portfolio.json').catch(() => null);
        if (file) {
          let remote;
          try { remote = JSON.parse(file.content); } catch { remote = null; }
          if (remote) {
            const remoteTime = new Date(remote.lastModified || 0).getTime();
            // Conflict scenario: local has edits AND remote also has different newer data
            if (localTimeBefore > 0 && remoteTime > localTimeBefore + 60000) {
              // Remote is >1 min newer than local — likely another device pushed.
              // Check if local content really differs from remote (might be we already pulled this)
              const localOnlyConfig = { ...JSON.parse(localContent) };
              localOnlyConfig.lastModified = remote.lastModified;
              localOnlyConfig.settings = { ...localOnlyConfig.settings, github: undefined, appsScript: undefined };
              const remoteCompare = { ...remote };
              remoteCompare.settings = { ...remoteCompare.settings, github: undefined, appsScript: undefined };
              const reallyDiffers = JSON.stringify(localOnlyConfig) !== JSON.stringify(remoteCompare);

              if (reallyDiffers) {
                // Just pull silently — server-side timestamps are authoritative.
                // The OLD bug was bumping local timestamp on pull; that's now fixed.
                console.log('[init] Pulling newer remote, local was T=' + new Date(localTimeBefore).toISOString());
              }
            }
          }
        }

        // Always do the actual pull (uses fixed timestamp logic now)
        await githubPull({ silent: true });
        // Fetch latest prices — prefer Worker, fall back to prices.json
        let pr;
        if (isPriceWorkerConfigured()) {
          pr = await fetchPricesFromWorker().then(p => ({ ok: true, prices: p })).catch(() => ({ ok: false }));
        } else {
          pr = await githubPullPrices({ silent: true });
        }
        if (pr.ok && pr.prices) {
          applyPrices(pr.prices);
          saveState(true, false); // preserve timestamp from pull
          render();
        }
      }, 600);
    }
    updateGithubDot('idle');
  } else if (isPriceWorkerConfigured()) {
    // No GitHub sync but Worker configured — still fetch prices on open
    setTimeout(async () => {
      const p = await fetchPricesFromWorker().catch(() => null);
      if (p) { applyPrices(p); saveState(true, false); render(); }
    }, 600);
  }

// Collect symbols from portfolio, call Worker, return prices object
// (same shape as old prices.json: { kursUsdIdr, stocks, crypto })
async function fetchPricesFromWorker() {
  const { url, token } = getPriceWorkerConfig();
  if (!url) throw new Error('Price Worker URL belum di-set di Settings');

  // Collect stock symbols (IDX with .JK suffix, US as-is)
  const idxSymbols = (state.stockbit?.positions || [])
    .map(p => (p.kode || '').toUpperCase()).filter(Boolean).map(k => k + '.JK');
  const usSymbols = (state.gotrade?.positions || [])
    .map(p => (p.ticker || '').toUpperCase()).filter(Boolean);
  const stocks = [...new Set([...idxSymbols, ...usSymbols])];

  // Collect crypto CoinGecko IDs
  const cryptoMap = CRYPTO_SYMBOL_MAP || {};
  const cryptoIds = (state.pluang?.positions || [])
    .map(p => cryptoMap[(p.simbol || '').toUpperCase()])
    .filter(Boolean);

  // Build URL
  const params = new URLSearchParams();
  if (stocks.length) params.set('stocks', stocks.join(','));
  if (cryptoIds.length) params.set('crypto', cryptoIds.join(','));
  if (token) params.set('token', token);

  const fetchUrl = `${url}${url.includes('?') ? '&' : '?'}${params.toString()}`;
  const res = await fetch(fetchUrl, { cache: 'no-cache' });
  if (!res.ok) {
    if (res.status === 401) throw new Error('Token Worker salah');
    throw new Error(`Worker HTTP ${res.status}`);
  }
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// UTF-8 ↔ Base64 (handles Indonesian characters etc.)
function utf8ToBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  const chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return btoa(binary);
}
function base64ToUtf8(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

// Generic GitHub API request
async function githubApi(endpoint, options = {}) {
  const { token } = getGithubConfig();
  if (!token) throw new Error('Token GitHub kosong');
  const res = await fetch(`${GH_API}${endpoint}`, {
    ...options,
    headers: {
      'Accept': 'application/vnd.github+json',
      'Authorization': `Bearer ${token}`,
      'X-GitHub-Api-Version': '2022-11-28',
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    let errMsg = `HTTP ${res.status}`;
    try {
      const errBody = await res.json();
      if (errBody.message) errMsg += ` — ${errBody.message}`;
    } catch {}
    const err = new Error(errMsg);
    err.status = res.status;
    throw err;
  }
  // Some GitHub endpoints return 204 No Content with empty body
  // (e.g. workflow_dispatch). Don't try to parse JSON in that case.
  if (res.status === 204) return {};
  // Defensive: if Content-Length is 0 or missing AND response is empty, return {}
  const contentLength = res.headers.get('content-length');
  if (contentLength === '0') return {};
  const text = await res.text();
  if (!text || !text.trim()) return {};
  try {
    return JSON.parse(text);
  } catch (e) {
    throw new Error(`Invalid JSON response: ${text.substring(0, 100)}`);
  }
}

// Get a file from the repo. Returns { content, sha } or null if not found.
async function githubGetFile(path) {
  const { owner, repo, branch } = getGithubConfig();
  try {
    const data = await githubApi(`/repos/${owner}/${repo}/contents/${path}?ref=${branch}`);
    return { content: base64ToUtf8(data.content), sha: data.sha };
  } catch (e) {
    if (e.status === 404) return null;
    throw e;
  }
}

// Put (create or update) a file. If sha provided, GitHub does conflict detection.
async function githubPutFile(path, content, message, sha = null) {
  const { owner, repo, branch } = getGithubConfig();
  const body = {
    message,
    content: utf8ToBase64(content),
    branch
  };
  if (sha) body.sha = sha;
  return githubApi(`/repos/${owner}/${repo}/contents/${path}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
}

// Pull portfolio.json from GitHub
async function githubPull({ silent = false } = {}) {
  if (!isGithubConfigured()) {
    if (!silent) toast('GitHub belum di-setup');
    return { ok: false };
  }
  updateGithubDot('pending');
  try {
    const file = await githubGetFile('portfolio.json');
    if (!file) {
      if (!silent) toast('portfolio.json belum ada di repo. Klik Push untuk upload pertama.');
      updateGithubDot('idle');
      return { ok: false, error: 'not_found' };
    }
    const remote = JSON.parse(file.content);
    const remoteTime = new Date(remote.lastModified || 0).getTime();
    const localTime = new Date(state.lastModified || 0).getTime();
    lastPortfolioSha = file.sha;

    if (remoteTime > localTime + 1000) {
      // Remote newer — adopt it. PRESERVE local device-specific config.
      const localGithub = JSON.parse(JSON.stringify(state.settings.github || {}));
      const localAppsScript = JSON.parse(JSON.stringify(state.settings.appsScript || {}));
      const localSheetsSyncUrls = JSON.parse(JSON.stringify(state.settings.sheetsSyncUrls || {}));

      state = remote;
      if (!state.snapshots) state.snapshots = [];
      if (!state.settings) state.settings = {};
      state.settings.github = localGithub;
      state.settings.appsScript = localAppsScript;
      if (!state.settings.sheetsSyncUrls || !Object.keys(state.settings.sheetsSyncUrls).length) {
        state.settings.sheetsSyncUrls = localSheetsSyncUrls;
      }

      // Preserve remote's authoritative lastModified — don't bump it
      // (state.lastModified was already set from `remote` above)
      saveState(true, false);
      render();
      if (!silent) toast(`✓ Pulled dari GitHub (${fmtDateTime(new Date(remoteTime).toISOString())})`);
      updateGithubDot('synced');
      return { ok: true, pulled: true };
    } else if (localTime > remoteTime + 1000) {
      if (!silent) toast('Local lebih baru. Klik Push untuk upload.');
      updateGithubDot('stale');
      return { ok: true, localNewer: true };
    } else {
      if (!silent) toast('✓ Sudah sinkron');
      updateGithubDot('synced');
      return { ok: true, inSync: true };
    }
  } catch (err) {
    console.error('GitHub pull error:', err);
    if (!silent) toast(`Pull gagal: ${err.message}`);
    updateGithubDot('error');
    return { ok: false, error: err.message };
  }
}

// Push portfolio.json to GitHub (with SHA-based conflict detection)
async function githubPush({ silent = false } = {}) {
  if (!isGithubConfigured()) {
    if (!silent) toast('GitHub belum di-setup');
    return { ok: false };
  }
  updateGithubDot('pending');
  try {
    // Strip device-specific config from payload (token, etc.)
    const payload = JSON.parse(JSON.stringify(state));
    if (payload.settings) {
      payload.settings.github = { autoPull: payload.settings.github?.autoPull !== false, autoPush: payload.settings.github?.autoPush !== false };
      payload.settings.appsScript = { autoPull: true, autoPush: true };
    }
    const content = JSON.stringify(payload, null, 2);
    const message = `Update portfolio (${new Date().toISOString()})`;

    // Get current SHA for conflict detection
    if (!lastPortfolioSha) {
      try {
        const cur = await githubGetFile('portfolio.json');
        lastPortfolioSha = cur?.sha || null;
      } catch (e) { /* file might not exist yet */ }
    }

    let result;
    try {
      result = await githubPutFile('portfolio.json', content, message, lastPortfolioSha);
    } catch (err) {
      // 409 Conflict = SHA mismatch (someone else pushed). Re-fetch SHA and retry.
      if (err.status === 409 || (err.status === 422 && err.message.includes('sha'))) {
        const cur = await githubGetFile('portfolio.json');
        lastPortfolioSha = cur?.sha || null;
        result = await githubPutFile('portfolio.json', content, message, lastPortfolioSha);
      } else {
        throw err;
      }
    }

    lastPortfolioSha = result.content.sha;
    const sizeKB = (result.content.size / 1024).toFixed(1);
    if (!silent) toast(`✓ Pushed ke GitHub (${sizeKB} KB)`);
    updateGithubDot('synced');
    return { ok: true };
  } catch (err) {
    console.error('GitHub push error:', err);
    if (!silent) toast(`Push gagal: ${err.message}`);
    updateGithubDot('error');
    return { ok: false, error: err.message };
  }
}

}

// Apply prices from prices.json to portfolio state
function applyPrices(prices) {
  if (!prices) return { applied: 0 };
  let applied = 0;

  // USD/IDR rate
  if (prices.kursUsdIdr && prices.kursUsdIdr > 0) {
    state.settings.kursUsdIdr = Math.round(prices.kursUsdIdr);
    const kursInput = document.getElementById('kursInput');
    if (kursInput) kursInput.value = state.settings.kursUsdIdr;
    applied++;
  }

  // Stockbit (IDX) — symbols stored as "BBCA.JK"
  if (prices.stocks) {
    state.stockbit.positions.forEach(p => {
      const key = `${(p.kode || '').toUpperCase()}.JK`;
      if (prices.stocks[key] != null && prices.stocks[key] > 0) {
        p.hargaSekarang = prices.stocks[key];
        applied++;
      }
    });
    // GoTrade (US) — symbols stored as "MSFT"
    state.gotrade.positions.forEach(p => {
      const key = (p.ticker || '').toUpperCase();
      if (prices.stocks[key] != null && prices.stocks[key] > 0) {
        p.hargaSekarangUSD = prices.stocks[key];
        applied++;
      }
    });
  }

  // Pluang (crypto)
  if (prices.crypto) {
    const cryptoMap = CRYPTO_SYMBOL_MAP || {};
    state.pluang.positions.forEach(p => {
      const symbol = (p.simbol || '').toUpperCase();
      const geckoId = cryptoMap[symbol];
      if (geckoId && prices.crypto[geckoId] != null && prices.crypto[geckoId] > 0) {
        p.hargaSekarang = prices.crypto[geckoId];
        applied++;
      }
    });
  }

  return { applied };
}

// Trigger GitHub Action manually (workflow_dispatch)
async function githubTriggerAction() {

  const { owner, repo, branch } = getGithubConfig();
  toast('Triggering price refresh action...');
  try {

      method: 'POST',

    });
    toast('✓ Action dipicu — tunggu ~30 detik untuk hasil');
  } catch (err) {
    if (err.status === 404) {
      toast('Workflow belum di-install. Klik "Install Workflow" dulu.');
    } else {
      toast(`Gagal: ${err.message}`);
    }
  }
}

// Install the GitHub Actions workflow + script files into the user's repo
const WORKFLOW_YAML = `name: Fetch Portfolio Prices

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'portfolio.json'
      - 'scripts/fetch-prices.js'

permissions:
  contents: write

concurrency:
  group: fetch-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch prices
        run: node scripts/fetch-prices.js
        env:
          COINGECKO_API_KEY: \${{ secrets.COINGECKO_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --staged --quiet; then
            echo "No price changes"
            exit 0
          fi
          git commit -m "chore: update prices [skip ci]"
          for attempt in 1 2 3; do
            echo "Push attempt \$attempt..."
            if git push; then
              echo "Push succeeded on attempt \$attempt"
              exit 0
            fi
            echo "Push failed — rebasing on remote..."
            git pull --rebase --autostash origin main || {
              git rebase --abort 2>/dev/null || true
              exit 1
            }
            sleep \$((attempt * 2))
          done
          echo "All push attempts exhausted"
          exit 1
`;

async function githubInstallWorkflow() {
  if (!isGithubConfigured()) {
    toast('GitHub belum di-setup');
    return;
  }
  if (!confirm('Install workflow file ke repo?\n\nIni akan menambahkan:\n• .github/workflows/fetch-prices.yml\n• scripts/fetch-prices.js\n\nWorkflow akan auto-fetch harga setiap 15 menit.')) return;

  toast('Installing workflow files...');
  try {
    // Get fetch-prices.js content from app's bundled string
    const FETCH_SCRIPT = window.__FETCH_PRICES_SCRIPT__;
    if (!FETCH_SCRIPT) throw new Error('Script content not embedded');

    // Install workflow
    const wfExisting = await githubGetFile('.github/workflows/fetch-prices.yml');
    await githubPutFile(
      '.github/workflows/fetch-prices.yml',
      WORKFLOW_YAML,
      'Install price fetcher workflow',
      wfExisting?.sha
    );

    // Install script
    const scExisting = await githubGetFile('scripts/fetch-prices.js');
    await githubPutFile(
      'scripts/fetch-prices.js',
      FETCH_SCRIPT,
      'Install price fetcher script',
      scExisting?.sha
    );

    toast('✓ Workflow installed! Akan auto-run dalam ~15 menit, atau klik "Run Now" untuk trigger sekarang.');
  } catch (err) {
    console.error(err);
    toast(`Install gagal: ${err.message}`);
  }
}

// Debounced auto-push after edits
function scheduleGithubPush() {
  const cfg = getGithubConfig();
  if (!cfg.autoPush || !isGithubConfigured()) return;
  if (githubPushTimer) clearTimeout(githubPushTimer);
  updateGithubDot('pending');
  githubPushTimer = setTimeout(() => githubPush({ silent: true }), 3000);
}

function updateGithubDot(status) {
  const dot = document.getElementById('githubSyncDot');
  if (!dot) return;
  dot.className = 'drive-sync-dot';
  if (status === 'synced') dot.classList.add('synced');
  else if (status === 'pending') dot.classList.add('pending');
  else if (status === 'error') dot.classList.add('error');
  else if (status === 'stale') dot.classList.add('stale');
  dot.style.display = isGithubConfigured() ? 'inline-block' : 'none';
  dot.title = {
    synced: 'GitHub sync: up-to-date',
    pending: 'GitHub sync: menyimpan…',
    error: 'GitHub sync: error',
    stale: 'GitHub sync: data lokal lebih baru',
    idle: 'GitHub sync: idle',
    off: 'GitHub sync: belum aktif'
  }[status] || 'GitHub sync';
}
